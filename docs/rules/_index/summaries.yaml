  temnoe_zrenie: Вы касаетесь согласного существа и даруете ему возможность видеть
    в темноте.; Пока заклинание активно, это существо обладает тёмным зрением в пределах
    60 футов.
  tenzerov_paryashchiy_disk: Это заклинание создаёт круглый горизонтальный диск из
    силового поля диаметром 3 фута и толщиной 1 дюйм (2,5 см.), парящий в 3 футах
    над полом в свободном простр; Диск существует, пока заклинание активно, и может
    вынести на себе 500 фунтов.
  ternovaya_stena: Стена появляется в пределах дистанции на твёрдой поверхности и
    существует, пока активно заклинание.; Когда стена появляется, все существа, находящиеся
    в ней, должны совершить спасбросок Ловкости.
  tishina: Пока заклинание активно, никакие звуки не могут раздаться в пределах сферы
    с радиусом 20 футов с центром на точке, выбранной в пределах дистанции, а также
    не мо; Все существа и предметы, полностью находящиеся в сфере, получают иммунитет
    к урону звуком, и существа считаются оглохшими, когда полностью находятся в ней.
  tryuk_s_verevkoy: На верхнем конце верёвки появляется невидимый вход в межпространство,
    существующий, пока заклинание активно.; В этом межпространстве может поместиться
    восемь существ с размером не больше Среднего.
  tumannoe_oblako: Она существует до окончания действия заклинания, или пока её не
    рассеет ветер (со скоростью как минимум 10 миль в час).
  tumannyy_shag: Туманный Шаг
  tma: Существа с тёмным зрением не могут видеть сквозь эту тьму, и немагический свет
    не может её осветить.; Если часть зоны этого заклинания накрывает зону света,
    созданного заклинанием с уровнем не выше 2, заклинание, создавшее свет, рассеивается.
  ubezhishche: Пока заклинание активно, все существа, нацеливающиеся на защищённое
    существо атаками или вредоносными заклинаниями, должны вначале совершить спасбросок
    Мудрости; При провале существо должно выбрать новую цель или потеряет атаку или
    заклинание.
  uderzhanie_lichnosti: Цель должна преуспеть в спасброске Мудрости, иначе станет
    парализованной на период действия заклинания.; В конце каждого своего хода цель
    может совершать новые спасброски Мудрости.
  uderzhanie_chudovishcha: Цель должна преуспеть в спасброске Мудрости, иначе станет
    парализованной на период действия заклинания.; Это заклинание не оказывает эффекта
    на нежить.
  uzilishche: Тюрьма в форме коробки может быть с длиной ребра до 10 футов, и она
    является сплошным барьером, останавливающим любую материю, и блокирующую заклинания,
    наклады; Когда вы накладываете это заклинание, под его действие попадают все существа,
    находящиеся целиком внутри области.
  umirotvorenie: 'Все гуманоиды в сфере с радиусом 20 футов с центром в точке, выбранной
    в пределах дистанции, должны совершить спасбросок Харизмы; существо может добровольно
    про; Если существо проваливает спасбросок, выберите один из двух описанных ниже
    эффектов: Вы можете подавить все эффекты, делающие цель очарованной или испуганной.'
  uskorenie: Пока заклинание активно, скорость
  sleep: Это заклинание посылает существ в магический сон.; Бросьте 5к8; результат
    будет количеством хитов существ, на которых это заклинание может подействовать.
  usykhanie: Цель должна совершить спасбросок Телосложения.; Цель получает урон некротической
    энергией 8к8 в случае провала или половину этого урона в случае успеха.
  ukhod_v_inoy_mir: В качестве альтернативы, если вы знаете последовательность знаков
    телепортационного круга на другом плане существования, это заклинание может перенести
    вас в эт; Вы можете использовать это заклинание, чтобы изгонять несогласных существ
    на другой план.
  falshivyy_dvoynik: Двойник существует, пока заклинание активно, но невидимость оканчивается,
    если вы атакуете или накладываете заклинание.; Вы можете действием переместить
    своего иллюзорного двойника на расстояние, вдвое превышающее вашу скорость, и
    заставить его жестикулировать, говорить и вести се
  khozhdenie_po_vetru: Вы и до десяти согласных существ, видимых вами в пределах дистанции,
    на время длительности заклинания принимаете газообразную форму, становясь лёгкими
    облачками; Находясь в форме облака, существо получает скорость полёта 300 футов
    и сопротивление к урону от немагического оружия.
  khozhdenie_po_vode: Это заклинание дарует способность перемещаться по жидкой поверхности
    — такой как вода, кислота, грязь, снег, зыбучий песок или лава — как если бы это
    была безвр; До десяти согласных существ, видимых вами в пределах дистанции, получают
    эту же способность на время действия заклинания.
  tsvetnoy_sharik: Выберите звук, кислоту, огонь, холод, электричество или яд при
    создании сферы, а затем совершите по цели дальнобойную атаку заклинанием.; Если
    атака попадает, существо получает урон 3к8 выбранного вида.
  tsepkaya_loza: Когда вы накладываете это заклинание, вы можете приказать лозе ухватить
    видимое вами существо, находящееся в пределах 30 футов от неё.; Это существо должно
    преуспеть в спасброске Ловкости, иначе его подтянет на 20 футов к лозе.
  tsunami: Стена существует, пока заклинание активно.; Когда стена появляется, все
    существа в её области должны совершить спасбросок Силы.
  shield_of_faith: Мерцающее поле появляется, окружая выбранное вами существо в пределах
    дистанции, даруя ему на время длительности бонус +2 к КД.
  lightning_bolt: Все существа в линии должны совершить спасбросок Ловкости.; При
    провале существо получает урон электричеством 8к6, или половину урона при успехе.
