# Размеры существ D&D 5e

size:
  TINY:
    name: "tiny"
    description: "Размер с кошку или меньше"
    space: "2.5 на 2.5 фута"
    reach: 0
    examples: ["imp", "sprite", "faerie dragon"]
    
  SMALL:
    name: "small"
    description: "Размер с гоблина или хоббита"
    space: "5 на 5 футов"
    reach: 5
    examples: ["goblin", "halfling", "goblin dog"]
    
  MEDIUM:
    name: "medium"
    description: "Размер с человека или эльфа"
    space: "5 на 5 футов"
    reach: 5
    examples: ["human", "elf", "orc", "wolf"]
    
  LARGE:
    name: "large"
    description: "Размер с огра или минотавра"
    space: "10 на 10 футов"
    reach: 10
    examples: ["ogre", "hill giant", "horse"]
    
  HUGE:
    name: "huge"
    description: "Размер с гиганта или древнего дракона"
    space: "15 на 15 футов"
    reach: 15
    examples: ["cloud giant", "ancient dragon", "elephant"]
    
  GARGANTUAN:
    name: "gargantuan"
    description: "Размер с кракена или колосса"
    space: "20 на 20 футов или больше"
    reach: 20
    examples: ["kraken", "ancient red dragon", "tarrasque"]
