# Classes
classes:
  fighter:
    name: "Fighter"
    description: "Master of weapons and armor, combat specialist. Fighters are trained to fight with various types of weapons and armor, master many combat styles, and possess excellent physical conditioning."
    features:
      fighting_style: "Fighting Style"
      second_wind: "Second Wind"
      improved_critical: "Improved Critical"
      improved_second_wind: "Improved Second Wind"
      extra_attack: "Extra Attack"
    
    subclasses:
      battle_master: "Battle Master"
      eldritch_knight: "Eldritch Knight"
      champion: "Champion"
  
  rogue:
    name: "Rogue"
    description: "Master of stealth, agility, and precise strikes. Rogues excel at infiltrating secure places, disarming traps, and delivering precise strikes to vulnerable enemy locations."
    features:
      expertise: "Expertise"
      sneak_attack: "Sneak Attack"
      thieves_cant: "Thieves' Cant"
      cunning_action: "Cunning Action"
      improved_sneak_attack: "Improved Sneak Attack"
      uncanny_dodge: "Uncanny Dodge"
    
    subclasses:
      assassin: "Assassin"
      phantom: "Phantom"
      thief: "Thief"
  
  cleric:
    name: "Cleric"
    description: "Servant of a deity, using divine magic. Clerics serve higher powers, receive divine magic from them, and serve as conduits for their gods' will in the mortal world."
    features:
      divine_domain: "Divine Domain"
      ritual_casting: "Ritual Casting"
      spell_recovery: "Spell Recovery"
      divine_focus: "Divine Focus"
      destroy_undead: "Destroy Undead"
      divine_intervention: "Divine Intervention"
    
    subclasses:
      life_domain: "Life Domain"
      light_domain: "Light Domain"
      war_domain: "War Domain"
      forge_domain: "Forge Domain"
  
  bard:
    name: "Bard"
    description: "Inspiring storyteller and music magician. Bards use music and words to create magical effects, inspire allies, and influence the minds of those around them."
    features:
      bardic_inspiration: "Bardic Inspiration"
      jack_of_all_trades: "Jack of All Trades"
      song_of_rest: "Song of Rest"
      expertise_bard: "Expertise"
      inspiring_mantle: "Inspiring Mantle"
      improved_inspiration: "Improved Inspiration"
      magical_secrets: "Magical Secrets"
    
    subclasses:
      lore_college: "College of Lore"
      valor_college: "College of Valor"
      glamour_college: "College of Glamour"

