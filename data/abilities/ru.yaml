# Классы (classes)
classes:
  fighter:
    name: "Воин"
    description: "Мастер оружия и доспехов, специалист по бою. Воины обучены сражаться с различными видами оружия и доспехов, владеют многими боевыми стилями и обладают превосходной физической подготовкой."
    features:
      fighting_style: "Боевой стиль"
      second_wind: "Восстановление"
      improved_critical: "Улучшенная критическая атака"
      improved_second_wind: "Улучшенное восстановление"
      extra_attack: "Атака дополнительным действием"
    
    subclasses:
      battle_master: "Мастер боевых искусств"
      eldritch_knight: "Рыцарь-заклинатель"
      champion: "Чемпион"
  
  rogue:
    name: "Плут"
    description: "Мастер скрытности, ловкости и точных ударов. Плуты превосходно справляются с проникновением в защищенные места, обезвреживанием ловушек и нанесением точных ударов по уязвимым местам противника."
    features:
      expertise: "Экспертиза"
      sneak_attack: "Скрытая атака"
      thieves_cant: "Воровской жаргон"
      cunning_action: "Коварная атака"
      improved_sneak_attack: "Улучшенная скрытая атака"
      uncanny_dodge: "Улучшенная коварная атака"
    
    subclasses:
      assassin: "Ассасин"
      phantom: "Призрачный разбойник"
      thief: "Теневой плут"
  
  cleric:
    name: "Жрец"
    description: "Слуга божества, использующий божественную магию. Жрецы служат высшим силам, получают от них божественную магию и служат проводниками воли своих богов в мире смертных."
    features:
      divine_domain: "Божественный домен"
      ritual_casting: "Заклинание ритуала"
      spell_recovery: "Восстановление заклинаний"
      divine_focus: "Божественная фокусировка"
      destroy_undead: "Уничтожение нежити"
      divine_intervention: "Божественное вмешательство"
    
    subclasses:
      life_domain: "Домен жизни"
      light_domain: "Домен света"
      war_domain: "Домен войны"
      forge_domain: "Домен кузницы"
  
  bard:
    name: "Бард"
    description: "Вдохновляющий рассказчик и маг музыки. Барды используют музыку и слова для создания магических эффектов, вдохновляют союзников и влияют на умы окружающих."
    features:
      bardic_inspiration: "Вдохновение барда"
      jack_of_all_trades: "Джек всех мастеров"
      song_of_rest: "Песнь отдыха"
      expertise_bard: "Экспертиза"
      inspiring_mantle: "Вдохновляющая защитная мантия"
      improved_inspiration: "Улучшенное вдохновение"
      magical_secrets: "Магические тайны"
    
