    description: "Полуорки - сильные и выносливые воины"
    ability_bonuses_description: "Сила +2, Телосложение +1"
  
  dwarf:
    name: "Дварф"
    description: "Дварфы - стойкие и выносливые горняки"
    ability_bonuses_description: "Телосложение +2"
  
  halfling:
    name: "Полурослик"
    description: "Полурослики - маленькие и ловкие существа"
    ability_bonuses_description: "Ловкость +2"
  
  gnome:
