# English localization for classes
# Contains translations for all fields with *_key

classes:
  fighter:
    name: "Fighter"
    description: "Master of weapons and armor, combat specialist. Fighters are trained to fight with various types of weapons and armor, master many combat styles and have excellent physical training."
    features:
      fighting_style: "Fighting Style"
      fighting_style_description: "Choice of one combat style: Dueling, Protection, Archery, Great Weapon Fighting, Two-Weapon Fighting, Protection"
      second_wind: "Second Wind"
      second_wind_description: "Short rest restores some health"
      improved_critical: "Improved Critical Hit"
      improved_critical_description: "Critical hits deal extra damage"
      improved_second_wind: "Improved Second Wind"
      improved_second_wind_description: "Increased health restoration"
      extra_attack: "Extra Attack"
      extra_attack_description: "Ability to attack as bonus action"
    subclasses:
      battle_master:
        name: "Battle Master"
        description: "Specialist in combat maneuvers that control the battlefield"
        features:
          battle_maneuvers: "Battle Maneuvers"
          battle_maneuvers_description: "Study of combat maneuvers to control the battlefield"
          improved_battle_maneuvers: "Improved Battle Maneuvers"
          improved_battle_maneuvers_description: "Additional uses of battle maneuvers"
          superiority_dice: "Superiority Dice"
          superiority_dice_description: "Increased number of maneuver uses"
      eldritch_knight:
        name: "Eldritch Knight"
        description: "Fighter who has studied magic to enhance combat abilities"
        features:
          spells: "Spells"
          spells_description: "Access to wizard spells"
          weapon_bond: "Weapon Bond"
          weapon_bond_description: "Magical connection to weapon"
          eldritch_strike: "Eldritch Strike"
          eldritch_strike_description: "Attack with extra damage"
  
  wizard:
    name: "Wizard"
    description: "A scholar of magic, studying the secrets of the universe through spells"
    features:
      arcane_recovery: "Arcane Recovery"
      arcane_recovery_description: "Restore magical power during short rest"
      spell_mastery: "Spell Mastery"
      spell_mastery_description: "Enhance effectiveness of certain spells"
    subclasses:
      evocation:
        name: "Evocation"
        description: "Specialist in creating magical effects and attacks"
        features:
          sculpt_spells: "Sculpt Spells"
          sculpt_spells_description: "Create safe zones in your spells"
      abjuration:
        name: "Abjuration"
        description: "Protector specializing in defensive spells"
        features:
          arcane_ward: "Arcane Ward"
          arcane_ward_description: "Create protective barrier"
  
  rogue:
