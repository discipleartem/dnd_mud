# Расы Dungeons & Dragons 5e
# Базовые расы из Player's Handbook

races:
  human:
    name_key: "races.human.name"
    description_key: "races.human.description"
    ability_bonuses:
      strength: 1
      dexterity: 1
      constitution: 1
      intelligence: 1
      wisdom: 1
      charisma: 1
    size: "medium"
    speed: 30
    age:
      min: 16
      max: 100
    alignment: ["any"]
    languages: ["common"]
    traits: []
    features: []
    allow_base_race_choice: true
    
    subraces:
      variant_human:
        name_key: "races.human.subraces.variant_human.name"
        description_key: "races.human.subraces.variant_human.description"
        ability_bonuses:
          strength: 1
          dexterity: 1
          constitution: 1
          intelligence: 1
          wisdom: 1
          charisma: 1
        skills: ["any"]
        feat: true
        inherit_base_abilities: false
        features:
          - name_key: "races.human.subraces.variant_human.features.ability_increase"
            description_key: "races.human.subraces.variant_human.features.ability_increase_description"
            mechanics:
              type: "ability_bonus"
              target: "choice"
              count: 2
              value: 1
          - name: "skills"
            description: "Gain proficiency in one skill"
            mechanics:
              type: "skill_proficiency"
              count: 1
              choice: true
          - name: "feat"
            description: "Gain one feat"
            mechanics:
              type: "feat"
              count: 1

  elf:
    ability_bonuses:
      dexterity: 2
    size: "medium"
    speed: 30
    age:
      min: 100
      max: 750
    alignment: ["chaotic_good", "neutral", "chaotic_neutral"]
    languages: ["common", "elvish"]
    traits: ["fey_ancestry", "trance"]
    features: ["keen_senses", "darkvision"]
    
    subraces:
      high_elf:
        ability_bonuses:
          intelligence: 1
        inherit_base_abilities: true
        features:
          - name: "weapon_training"
            description: "Proficiency with longswords, shortswords, shortbows, and longbows"
            mechanics:
              type: "weapon_proficiency"
              weapons: ["longsword", "shortsword", "shortbow", "longbow"]
          - name: "high_elf_cantrip"
            description: "Learn one cantrip from the wizard spell list"
            mechanics:
              type: "cantrip"
              count: 1
              class: "wizard"
      wood_elf:
        ability_bonuses:
          wisdom: 1
        inherit_base_abilities: true
        features:
          - name: "weapon_training"
            description: "Proficiency with longswords, rapiers, shortswords, and longbows"
            mechanics:
              type: "weapon_proficiency"
              weapons: ["longsword", "rapier", "shortsword", "longbow"]
          - name: "fleet_speed"
            description: "Base walking speed of 35 feet"
            mechanics:
              type: "speed_bonus"
              value: 5
          - name: "mask_of_the_wild"
            description: "Advantage on Dexterity (Stealth) checks in forest terrain"
            mechanics:
              type: "skill_advantage"
              skill: "stealth"
              terrain: "forest"

  dwarf:
    ability_bonuses:
      constitution: 2
    size: "medium"
    speed: 25
    age:
      min: 50
      max: 350
    alignment: ["lawful_good", "neutral", "lawful_neutral"]
    languages: ["common", "dwarvish"]
    traits: ["dwarven_resilience"]
    features: ["darkvision", "stonecunning"]
    
    subraces:
      hill_dwarf:
        ability_bonuses:
          wisdom: 1
        inherit_base_abilities: true
        features:
          - name: "dwarven_toughness"
            description: "Increase hit point maximum by 1 per level"
            mechanics:
              type: "hit_point_bonus"
              value: 1
              per_level: true
      mountain_dwarf:
        ability_bonuses:
          strength: 2
        inherit_base_abilities: true
        features:
          - name: "mountain_dwarf_training"
            description: "Proficiency with light and medium armor"
            mechanics:
              type: "armor_proficiency"
              armor_types: ["light", "medium"]

  halfling:
    ability_bonuses:
      dexterity: 2
    size: "small"
    speed: 25
    age:
      min: 20
      max: 150
    alignment: ["lawful_good", "neutral", "chaotic_good"]
    languages: ["common", "halfling"]
    traits: ["brave", "halfling_nimbleness", "lucky"]
    features: []
    
    subraces:
      lightfoot_halfling:
        ability_bonuses:
          charisma: 1
        inherit_base_abilities: true
        features:
          - name: "naturally_stealthy"
            description: "Can hide when obscured by a creature that is at least one size larger"
            mechanics:
              type: "stealth_bonus"
              condition: "larger_creature_cover"
      stout_halfling:
        ability_bonuses:
          constitution: 1
        inherit_base_abilities: true
        features:
          - name: "stout_resilience"
            description: "Advantage on saving throws against poison and resistance against poison damage"
            mechanics:
              type: "save_advantage"
              effect: "poison"

  gnome:
    ability_bonuses:
      intelligence: 2
    size: "small"
    speed: 25
    age:
      min: 40
      max: 500
    alignment: ["lawful_good", "neutral", "chaotic_neutral"]
    languages: ["common", "gnomish"]
    traits: ["gnomish_cunning"]
    features: ["darkvision"]
    
    subraces:
      forest_gnome:
        ability_bonuses:
          dexterity: 1
        inherit_base_abilities: true
        features:
          - name: "natural_illusionist"
            description: "Learn the minor illusion cantrip"
            mechanics:
              type: "cantrip"
              count: 1
              school: "illusion"
          - name: "speak_with_small_beasts"
            description: "Can communicate with small beasts and animals"
            mechanics:
              type: "communication"
              creatures: ["small_beasts", "animals"]
      rock_gnome:
        ability_bonuses:
          constitution: 1
        inherit_base_abilities: true
        features:
          - name: "artificers_lore"
            description: "Advantage on Intelligence (History) checks related to magic items"
            mechanics:
              type: "skill_advantage"
              skill: "history"
              context: "magic_items"
          - name: "tinker"
            description: "Create small mechanical devices"
            mechanics:
              type: "crafting"
              items: ["clockwork_toy", "fire_starter", "music_box"]

  half_elf:
    ability_bonuses:
      charisma: 2
    size: "medium"
    speed: 30
    age:
      min: 20
      max: 180
    alignment: ["any"]
    languages: ["common", "elvish"]
    traits: ["fey_ancestry"]
    features: ["darkvision", "skill_versatility"]
    additional_abilities:
      choice_count: 2
      choice_from: ["strength", "dexterity", "constitution", "intelligence", "wisdom"]

  half_orc:
    ability_bonuses:
      strength: 2
      constitution: 1
    size: "medium"
    speed: 30
    age:
      min: 14
      max: 80
    alignment: ["chaotic_neutral", "neutral", "chaotic_evil"]
    languages: ["common", "orcish"]
    traits: []
    features: ["darkvision", "relentless_endurance", "savage_attacks", "restless_endurance", "half_orc_resilience"]

  dragonborn:
    ability_bonuses:
      strength: 2
      charisma: 1
    size: "medium"
    speed: 30
    age:
      min: 15
      max: 80
    alignment: ["any"]
    languages: ["common", "draconic"]
    traits: []
    features: ["darkvision", "draconic_ancestry", "breath_weapon", "damage_resistance"]

  tiefling:
    ability_bonuses:
      intelligence: 1
      charisma: 2
    size: "medium"
    speed: 30
    age:
      min: 18
      max: 100
    alignment: ["chaotic_neutral", "neutral", "chaotic_evil"]
    languages: ["common", "abyssal"]
    traits: []
    features: ["darkvision", "hellish_resistance", "infernal_legacy"]
