# Локализация рас для Dungeons & Dragons 5e
# Используется с data/races/races.yaml

races:
  human:
    name: "Человек"
    description: "Люди - самые разнообразные и амбициозные из всех рас."
    ability_bonuses_description: "Бонус +1 ко всем характеристикам"
    features:
      additional_language: "Дополнительный язык"
      additional_language_description: "Вы можете говорить, читать и писать на одном дополнительном языке по вашему выбору."
    subraces:
      variant_human:
        name: "Человек (вариант)"
        description: "Альтернативный вариант создания человека с выбором характеристик, навыков и черт"
        ability_bonuses_description: "2 характеристики +1"
        features:
          ability_increase: "Увеличение характеристик"
          ability_increase_description: "Значение двух характеристик на ваш выбор увеличивается на 1"
          skills: "Навыки"
          skills_description: "Вы получаете владение одним навыком на ваш выбор"
          feat: "Черта"
          feat_description: "Вы получаете одну черту на ваш выбор"
          
  elf:
    name: "Эльф"
    description: "Эльфы - изящные долгожители с магической природой."
    ability_bonuses_description: "Ловкость +2"
    features:
      keen_senses: "Острые чувства"
      keen_senses_description: "Получите мастерство в навыке Восприятие"
      darkvision: "Темное зрение"
      darkvision_description: "Можете видеть в условиях слабого освещения на расстоянии 60 футов"
      fey_ancestry: "Фейская природа"
      fey_ancestry_description: "Преимущество при спасбросках Харизмы от очарования"
      trance: "Транс"
      trance_description: "Не нуждаетесь во сне, медитируете 4 часа"
    subraces:
      high_elf:
        name: "Высший эльф"
        description: "Эльф с магическими способностями и интеллектом"
        ability_bonuses_description: "Интеллект +1"
        features:
          additional_language: "Дополнительный язык"
          additional_language_description: "Изучите один дополнительный язык по вашему выбору"
          high_elf_cantrip: "Заклинание высшего эльфа"
          high_elf_cantrip_description: "Изучите одно заговор волшебника"
      wood_elf:
        name: "Лесной эльф"
        description: "Эльф, живущий в гармонии с природой"
        ability_bonuses_description: "Мудрость +1"
        features:
          weapon_training: "Обучение оружию"
          weapon_training_description: "Владение длинным мечом, рапирой, коротким мечом, длинным луком и коротким луком"
          fleet_speed: "Быстрота"
          fleet_speed_description: "Скорость передвижения 35 футов"
          mask_of_the_wild: "Маскировка дикой природы"
          mask_of_the_wild_description: "Преимущество при проверках Ловкости (Скрытность) в лесистой местности"
          
  dwarf:
    name: "Дварф"
    description: "Дварфы - стойкие и выносливые горные народы, мастера ремёсел и воины."
    ability_bonuses_description: "Телосложение +2"
    features:
      darkvision: "Темное зрение"
      darkvision_description: "Можете видеть в условиях слабого освещения на расстоянии 60 футов"
      dwarven_resilience: "Дварфийская выносливость"
      dwarven_resilience_description: "Преимущество при спасбросках от яда и сопротивление урону ядом"
      stonecunning: "Камнечувство"
      stonecunning_description: "Преимущество при проверках Интеллекта (История) связанных с камнем"
    subraces:
      hill_dwarf:
        name: "Холмовой дварф"
        description: "Дварф, живущий в холмах"
        ability_bonuses_description: "Мудрость +1"
        features:
          dwarven_toughness: "Дварфийская крепость"
          dwarven_toughness_description: "Увеличенные хиты на каждом уровне"
      mountain_dwarf:
        name: "Горный дварф"
        description: "Дварф, живущий в горах"
        ability_bonuses_description: "Сила +2"
        features:
          mountain_dwarf_training: "Горная подготовка дварфа"
          mountain_dwarf_training_description: "Владение легкими и средними доспехами"
      fey_ancestry: "Наследие фей"
      fey_ancestry_description: "Преимущество при спасбросках от очарования"
      trance: "Транс"
      trance_description: "Медитация вместо сна. 4 часа медитации дают тот же отдых, что и 8 часов сна"
    subraces:
      high_elf:
        name: "Высший эльф"
        description: "Высшие эльфы ценят знания и магию, обладая острым умом и элегантностью"
        ability_bonuses_description: "Интеллект +1"
        features:
          additional_language: "Дополнительный язык"
          additional_language_description: "Можно выучить один дополнительный язык по выбору"
          high_elf_cantrip: "Заговор высшего эльфа"
          high_elf_cantrip_description: "Вы знаете один заговор из списка волшебника. Интеллект — ваша базовая характеристика для него"
      wood_elf:
        name: "Лесной эльф"
        description: "Лесные эльфы живут в гармонии с природой, обладая исключительной ловкостью и скоростью"
        ability_bonuses_description: "Мудрость +1"
        features:
          weapon_training: "Мастерство оружия лесного эльфа"
          weapon_training_description: "Владение длинными мечами, рапирами, короткими мечами, длинными и короткими луками"
          fleet_speed: "Быстрота лесного эльфа"
          fleet_speed_description: "Базовая скорость передвижения 35 футов"
          mask_of_the_wild: "Маскировка лесного эльфа"
          mask_of_the_wild_description: "Преимущество при проверках Ловкости (Скрытность) в лесистой местности"
  
  dwarf:
    name: "Дварф"
    description: "Стойкие и выносливые горные жители, мастера ремёсел и воины"
    ability_bonuses_description: "Выносливость +2"
    features:
      dwarven_resilience: "Дварфийская стойкость"
      dwarven_resilience_description: "Преимущество при спасбросках от яда и магии"
      stonecunning: "Каменное искусство"
      stonecunning_description: "Преимущество при проверках Истории, связанной с камнем и металлом"
      tool_proficiency: "Владение инструментами"
      tool_proficiency_description: "Владение одним видом ремесленных или игровых инструментов на выбор"
  
  halfling:
    name: "Полурослик"
    description: "Маленькие и ловкие существа, обожающие комфорт и хорошую еду"
    ability_bonuses_description: "Ловкость +2"
    features:
      halfling_nimbleness: "Полурослийская проворность"
      halfling_nimbleness_description: "Возможность перемещаться через пространство существа крупнее себя"
      lucky: "Удачливость"
      lucky_description: "Перебрасывание кубика 1, когда результат броска равен 1"
  
  gnome:
    name: "Гном"
    description: "Маленькие и умные существа, изобретатели и любознательные исследователи"
    ability_bonuses_description: "Интеллект +2"
    features:
      gnome_cunning: "Гномья хитрость"
      gnome_cunning_description: "Преимущество при спасбросках от интеллектуальных магических эффектов"
      artificer_natural: "Природный изобретатель"
      artificer_natural_description: "Способность создавать небольшие магические предметы"