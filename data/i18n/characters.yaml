# Локализация персонажей D&D

# Расы
races:
  human: "Человек"
  elf: "Эльф"
  dwarf: "Дварф"
  halfling: "Полурослик"
  gnome: "Гном"
  half_elf: "Полуэльф"
  half_orc: "Получеловек"
  dragonborn: "Драконорожденный"
  tiefling: "Тифлинг"
  
  # Описания рас
  descriptions:
    human: "Люди - самые разнообразные и амбициозные расы. Они способны к великим свершениям и низким падениям."
    elf: "Эльфы - изящные долгоживущие существа, близкие к природе и магии."
    dwarf: "Дварфы - крепкие и выносливые горняки, известные своей мастерской работой с металлом и камнем."
    halfling: "Полурослики - маленькие и хитрые существа, ценящие комфорт и безопасность."
    gnome: "Гномы - маленькие изобретатели и illusionists, обожающие механику и магические трюки."
    half_elf: "Полуэльфы сочетают в себе черты людей и эльфов, часто оказываясь между двух миров."
    half_orc: "Получеловеки - сильные и стойкие воины, часто сталкивающиеся с предрассудками."
    dragonborn: "Драконорожденные - гордые воины с чешуйчатой кожей и дыханием драконов."
    tiefling: "Тифлинги - существа с демоническим наследием, обладающие рогами и необычными способностями."

# Классы
classes:
  fighter: "Воин"
  wizard: "Волшебник"
  rogue: "Плут"
  cleric: "Жрец"
  druid: "Друид"
  monk: "Монах"
  paladin: "Паладин"
  ranger: "Следопыт"
  sorcerer: "Чародей"
  warlock: "Колдун"
  barbarian: "Варвар"
  bard: "Бард"
  artificer: "Изобретатель"
  
  # Описания классов
  descriptions:
    fighter: "Воины - мастера оружия и брони, обученные ведению боя в любых условиях."
    wizard: "Волшебники - учёные маги, изучающие тайны arcane магии через книги и исследования."
    rogue: "Плуты - мастера скрытности, обмана и точных ударов из тени."
    cleric: "Жрецы - служители божеств, использующие божественную силу для исцеления и защиты."
    druid: "Друиды - хранители природы, способные принимать форму животных и управлять стихиями."
    monk: "Монахи - воины дисциплины, использующие энергию тела для невероятных подвигов."
    paladin: "Паладины - священные воины, клянущиеся защищать справедливость и добро."
    ranger: "Следопыты - охотники и следопыты, мастера выживания в дикой природе."
    sorcerer: "Чародеи - маги с врождённой магической силой, текущей в их жилах."
    warlock: "Колдуны - маги, получившие силу от pact с могущественным существом."
    barbarian: "Варвары - дикие воины, черпающие силу от своей ярости."
    bard: "Барды - рассказчики и музыканты, использующие магию через искусство."
    artificer: "Изобретатели - мастера создания магических предметов и механизмов."

