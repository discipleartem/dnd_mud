races:
  human:
    name:
      ru: Человек
      en: Human
    description: Человечество — самая разнообразная и амбициозная раса
    age_range:
    - 16
    - 100
    size: medium
    speed: 30
    subraces:
      standard:
        name:
          ru: Человек (стандарт)
          en: Human (standard)
        description: Стандартный вариант человека из PHB
        languages:
        - common
        ability_bonuses:
          strength: 1
          dexterity: 1
          constitution: 1
          intelligence: 1
          wisdom: 1
          charisma: 1
        grants:
        - type: language
          count: 1
          choice: true
          pool: common
      variant_human:
        name:
          ru: Человек (вариант)
          en: Human (variant)
        description: Альтернативный вариант создания человека
        inherit:
          ability_bonuses: false
          grants: false
        grants:
        - type: ability_increase
          count: 2
          amount: 1
          choice: true
          allow_duplicates: false
        - type: skill_proficiency
          count: 1
          choice: true
          from: all
        - type: feat
          count: 1
          choice: true
          from: all
  elf:
    name:
      ru: Эльф
      en: Elf
    description: Эльфы — изящные и долгоживущие существа с тонкими чувствами
    age_range:
    - 20
    - 750
    size: medium
    speed: 30
    languages:
    - common
    - elvish
    ability_bonuses:
      dexterity: 2
    subraces:
      high_elf:
        name:
          ru: Высший эльф
          en: High Elf
        description: Высшие эльфы ценят знания и магию
        ability_bonuses:
          intelligence: 1
        grants:
        - weapons:
          - longsword
          - rapier
          - shortsword
          - longbow
          - shortbow
          type: weapon_proficiency
          name: Эльфийская боевая подготовка
        - count: 1
          choice: true
          pool: common
          type: language
          name: Дополнительный язык
        - source: wizard
          ability: intelligence
          count: 1
          choice: true
          type: cantrip
          name: Заговор высшего эльфа
      wood_elf:
        name:
          ru: Лесной эльф
          en: Wood Elf
        description: Лесные эльфы живут в гармонии с природой
        ability_bonuses:
          wisdom: 1
        speed: 35
        grants:
        - weapons:
          - longsword
          - rapier
          - shortsword
          - longbow
          - shortbow
          type: weapon_proficiency
          name: Эльфийская боевая подготовка
        - value: 35
          type: speed_bonus
          amount: 35
          name: Быстрота
        - skill: stealth
          terrain: forest
          type: advantage
          name: Маскировка лесного эльфа
      dark_elf_drow:
        name:
          ru: Дроу
          en: Drow
        description: Тёмные эльфы подземелий
        ability_bonuses:
          charisma: 1
        grants:
        - spells:
          - name: dancing_lights
            level: 0
            uses: at_will
          - name: faerie_fire
            level: 1
            uses: 1
            recharge: long_rest
          - name: darkness
            level: 2
            uses: 1
            recharge: long_rest
          ability: charisma
          type: spellcasting
          name: Магия дроу
        - weapons:
          - rapier
          - shortsword
          - hand_crossbow
          type: weapon_proficiency
          name: Боевая подготовка дроу
        - condition: direct_sunlight
          affected:
          - attacks
          - perception_checks
          type: disadvantage
          name: Чувствительность к солнечному свету
    grants:
    - skills:
      - perception
      type: skill_proficiency
      name: Обострённые чувства
    - range: 60
      type: darkvision
      name: Тёмное зрение
    - save: charisma
      effect: charm
      type: advantage
      name: Наследие фей
    - duration: 4
      effect: full_rest
      type: rest
      name: Транс
  dwarf:
    name:
      ru: Дварф
      en: Dwarf
    description: Дварфы — крепкие и выносливые мастера гор и ремёсел
    age_range:
    - 50
    - 350
    size: medium
    speed: 25
    languages:
    - common
    - dwarvish
    ability_bonuses:
      constitution: 2
    subraces:
      hill_dwarf:
        name:
          ru: Холмовой дварф
          en: Hill Dwarf
        description: Будучи холмовым дварфом вы обладаете обострёнными чувствами, развитой интуицией и замечательной стойкостью
        ability_bonuses:
          wisdom: 1
        grants:
        - value: 1
          per_level: true
          type: hit_point_bonus
          amount: 1
          name: Дварфская выдержка
      mountain_dwarf:
        name:
          ru: Горный дварф
          en: Mountain Dwarf
        description: Будучи горным дварфом, вы являетесь сильным и выносливым, приспособленным к жизни в суровой местности
        ability_bonuses:
          strength: 2
        grants:
        - armor_types:
          - light_armor
          - medium_armor
          type: armor_proficiency
          name: Владение доспехами дварфов
    grants:
    - armor_types:
      - heavy_armor
      type: speed_ignore_penalty
      name: Скорость дварфа
    - range: 60
      color_vision: false
      type: darkvision
      name: Тёмное зрение
    - damage_types:
      - poison
      advantage_saves:
      - poison
      type: resistance
      name: Дварфская устойчивость
    - weapons:
      - battleaxe
      - handaxe
      - light_hammer
      - warhammer
      type: weapon_proficiency
      name: Дварфская боевая подготовка
    - count: 1
      choice: true
      tools:
      - smith_tools
      - brewer_supplies
      - mason_tools
      type: tool_proficiency
      name: Владение инструментами
    - skill: history
      context: stonework_origin
      grants_proficiency: true
      expertise: true
      type: skill_bonus
      name: Знание камня
  half_orc:
    name:
      ru: Полуорк
      en: Half-Orc
    description: Полуорки — сильные и выносливые воины
    age_range:
    - 14
    - 80
    size: medium
    speed: 30
    subraces:
      half_orc:
        name:
          ru: Полуорк
          en: Half-Orc
        description: Полуорки — сильные и выносливые воины
        languages:
        - common
        - orcish
        ability_bonuses:
          strength: 2
          constitution: 1
        grants:
        - type: persistent_endurance
          trigger: damage_reduces_to_zero
          effect: remain_at_1_hp
        - type: damage_bonus
          trigger: critical_hit
          effect: reroll_one_damage_die
