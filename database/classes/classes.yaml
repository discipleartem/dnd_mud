classes:
  fighter:
    name:
      ru: Воин
      en: Fighter
    description: Мастер оружия и доспехов, специалист по бою. Воины обучены сражаться с различными видами оружия и доспехов,
      владеют многими боевыми стилями и обладают превосходной физической подготовкой.
    hit_dice: 10
    spellcasting: false
    subclass_choice_level: 3
    prime_ability: strength
    saving_throws:
    - strength
    - constitution
    skill_choices:
    - acrobatics
    - animal_handling
    - athletics
    - history
    - insight
    - intimidation
    - perception
    - survival
    skill_choices_count: 2
    starting_equipment:
      choices:
      - id: armor
        options:
        - id: chain_mail
          label:
            ru: а) Кольчуга
            en: a) Chain mail
          items:
          - kind: armor
            id: chain_mail
            qty: 1
        - id: leather_longbow
          label:
            ru: б) Кожаный доспех, длинный лук и 20 стрел
            en: b) Leather armor, longbow and 20 arrows
          items:
          - kind: armor
            id: leather
            qty: 1
          - kind: weapon
            id: longbow
            qty: 1
          - kind: equipment
            id: arrows
            qty: 1
      - id: weapon_primary
        options:
        - id: martial_shield
          label:
            ru: а) Воинское оружие и щит
            en: a) A martial weapon and a shield
          items:
          - kind: armor
            id: shield
            qty: 1
          weapon_picks:
          - pool: martial
        - id: two_martial
          label:
            ru: б) Два воинских оружия
            en: b) Two martial weapons
          weapon_picks:
          - pool: martial
          - pool: martial
      - id: ranged_or_axes
        options:
        - id: crossbow
          label:
            ru: а) Лёгкий арбалет и 20 болтов
            en: a) Light crossbow and 20 bolts
          items:
          - kind: weapon
            id: light_crossbow
            qty: 1
          - kind: equipment
            id: crossbow_bolts
            qty: 1
        - id: handaxes
          label:
            ru: б) Два ручных топора
            en: b) Two handaxes
          items:
          - kind: weapon
            id: handaxe
            qty: 2
      - id: pack
        options:
        - id: dungeoneers_pack
          label:
            ru: а) Набор исследователя подземелий
            en: a) Dungeoneer's pack
          items:
          - kind: equipment
            id: dungeoneers_pack
            qty: 1
        - id: explorers_pack
          label:
            ru: б) Набор путешественника
            en: b) Explorer's pack
          items:
          - kind: equipment
            id: explorers_pack
            qty: 1
      fixed: []
    proficiencies:
      weapons:
      - simple
      - martial
      armor:
      - light
      - medium
      - heavy
      - shield
      tools: []
    subclasses:
    - id: battle_master
      name:
        ru: Мастер боевых искусств
        en: Battle Master
      description: Воин, опирающийся на поколения боевых техник, кости превосходства и боевые приёмы.
      parent_class: fighter
      progression:
        3:
          grants:
          - id: combat_superiority
            name: Боевое превосходство
            description: Три приёма и четыре кости превосходства (к8); одно использование приёма за атаку
            feature_type: active
            requires_action: true
          - id: student_of_war
            name: Ученик войны
            description: Владение одним ремесленным инструментом на выбор
            feature_type: passive
            requires_action: false
            mechanics:
              type: tool_proficiency
              count: 1
              choice: true
              pool: artisans_tools
        7:
          grants:
          - id: know_your_enemy
            name: Познай своего врага
            description: Вне боя сравнить способности существа с вашими по выбранным характеристикам
            feature_type: passive
            requires_action: false
          - id: additional_maneuvers
            name: Дополнительные приёмы
            description: Два новых приёма; можно заменить один известный приём
            feature_type: passive
            requires_action: false
        10:
          grants:
          - id: superiority_dice_10
            name: Кость превосходства (10 ур.)
            description: Кости превосходства становятся к10
            feature_type: passive
            requires_action: false
    - id: eldritch_knight
      name:
        ru: Мистический рыцарь
        en: Eldritch Knight
      description: Воин, сочетающий мастерство боя с заклинаниями школ Воплощения и Ограждения.
      parent_class: fighter
      spellcasting: true
      spellcasting_level: 3
      progression:
        3:
          grants:
          - id: spellcasting_ek
            name: Использование заклинаний
            description: С 3 уровня — заклинания волшебника (заговоры и ячейки по таблице мистического рыцаря); известные
              заклинания 1+ уровня — школы Воплощения и Ограждения; базовая характеристика — Интеллект
            feature_type: spell
            requires_action: true
          - id: weapon_bond
            name: Связь с оружием
            description: 'Ритуальная связь с оружием: призыв бонусным действием, защита от обезоруживания'
            feature_type: active
            bonus_action: true
            requires_action: false
        7:
          grants:
          - id: war_magic
            name: Боевая магия
            description: После сотворения заговора бонусным действием можно совершить атаку оружием
            feature_type: active
            bonus_action: true
            requires_action: false
        10:
          grants:
          - id: eldritch_strike
            name: Мистический удар
            description: Попадание оружием может наложить на цель помеху к следующему спасброску от вашего заклинания
            feature_type: passive
            requires_action: false
    - id: champion
      name:
        ru: Чемпион
        en: Champion
      description: Воин, доводящий физическую мощь и точность ударов до смертоносного совершенства.
      parent_class: fighter
      progression:
        3:
          grants:
          - id: improved_critical_champion
            name: Улучшенные критические попадания
            description: Критическое попадание оружием при «19–20» на кости атаки
            feature_type: passive
            requires_action: false
        7:
          grants:
          - id: remarkable_athlete
            name: Выдающийся атлет
            description: Половина бонуса мастерства к проверкам Силы, Ловкости и Телосложения; бонус к прыжку с разбега
            feature_type: passive
            requires_action: false
        10:
          grants:
          - id: additional_fighting_style
            name: Дополнительный боевой стиль
            description: Второй боевой стиль на выбор
            feature_type: passive
            requires_action: false
    progression:
      1:
        grants:
        - id: fighting_style
          name: Боевой стиль
          description: 'Выбор одного из боевых стилей: Дуэлянт, Защита, Стрельба, Большое оружие, Двуручное оружие, Защита
            от снарядов'
