  rogue:
    name:
      ru: Плут
      en: Rogue
    description: Мастер скрытности, ловкости и точных ударов. Плуты превосходно справляются с проникновением в защищенные
      места, обезвреживанием ловушек и нанесением точных ударов по уязвимым местам противника.
    hit_dice: 8
    spellcasting: false
    subclass_choice_level: 3
    prime_ability: dexterity
    saving_throws:
    - dexterity
    - intelligence
    skill_choices:
    - acrobatics
    - athletics
    - deception
    - insight
    - intimidation
    - investigation
    - perception
    - performance
    - persuasion
    - sleight_of_hand
    - stealth
    skill_choices_count: 4
    starting_equipment:
      choices:
      - id: melee
        options:
        - id: rapier
          label:
            ru: а) Рапира
            en: a) Rapier
          items:
          - kind: weapon
            id: rapier
            qty: 1
        - id: shortsword
          label:
            ru: б) Короткий меч
            en: b) Shortsword
          items:
          - kind: weapon
            id: shortsword
            qty: 1
      - id: ranged
        options:
        - id: shortbow
          label:
            ru: а) Короткий лук и 20 стрел
            en: a) Shortbow and 20 arrows
          items:
          - kind: weapon
            id: shortbow
            qty: 1
          - kind: equipment
            id: arrows
            qty: 1
        - id: shortsword_alt
          label:
            ru: б) Короткий меч
            en: b) Shortsword
          items:
          - kind: weapon
            id: shortsword
            qty: 1
      - id: pack
        options:
        - id: burglars_pack
          label:
            ru: а) Набор взломщика
            en: a) Burglar's pack
          items:
          - kind: equipment
            id: burglars_pack
            qty: 1
        - id: dungeoneers_pack
          label:
            ru: б) Набор исследователя подземелий
            en: b) Dungeoneer's pack
          items:
          - kind: equipment
            id: dungeoneers_pack
            qty: 1
        - id: explorers_pack
          label:
            ru: в) Набор путешественника
            en: c) Explorer's pack
          items:
          - kind: equipment
            id: explorers_pack
            qty: 1
      fixed:
      - kind: armor
        id: leather
        qty: 1
      - kind: weapon
        id: dagger
        qty: 2
      - kind: tool
        id: thieves_tools
        qty: 1
    proficiencies:
      weapons:
      - simple
      - hand_crossbow
      - longsword
      - rapier
      - shortsword
      armor:
      - light
      tools:
      - thieves_tools
    subclasses:
    - id: thief
      name:
        ru: Вор
        en: Thief
      description: 'Плут, отточивший воровское ремесло: ловкость рук, лазание и магические предметы.'
      parent_class: rogue
      progression:
        3:
          grants:
          - id: fast_hands
            name: Быстрые руки
            description: Бонусным действием — Ловкость рук, воровские инструменты или Использование предмета
            feature_type: active
            bonus_action: true
            requires_action: false
          - id: second_story_work
            name: Форточник
            description: Лазание без дополнительных затрат движения; бонус к прыжку с разбега
            feature_type: passive
            requires_action: false
        9:
          grants:
          - id: supreme_sneak
            name: Высокая скрытность
            description: Преимущество на Скрытность, если в ходу перемещались не больше половины скорости
            feature_type: passive
            requires_action: false
    - id: assassin
      name:
        ru: Убийца
        en: Assassin
      description: 'Плут, владеющий смертоносным искусством: маскировка, яды и внезапные удары.'
      parent_class: rogue
      progression:
        3:
          grants:
          - id: assassin_proficiencies
            name: Дополнительные владения
            description: Набор для грима и инструменты отравителя
            feature_type: passive
            requires_action: false
            mechanics:
              type: tool_proficiency
              tools:
              - disguise_kit
              - poisoner_tools
          - id: assassinate
            name: Ликвидация
            description: Преимущество на атаку по существам, не совершившим ход; крит по застигнутым врасплох
            feature_type: passive
            requires_action: false
        9:
          grants:
          - id: infiltration_expertise
            name: Мастер проникновения
            description: Создание убедительной ложной личности и связей (7 дней, 25 зм)
            feature_type: passive
            requires_action: false
    - id: arcane_trickster
      name:
        ru: Мистический ловкач
        en: Arcane Trickster
      description: Плут, усиливающий ловкость заклинаниями школ Иллюзии и Очарования.
      parent_class: rogue
      spellcasting: true
      spellcasting_level: 3
      progression:
        3:
          grants:
          - id: spellcasting_at
            name: Использование заклинаний
            description: С 3 уровня — заклинания волшебника (заговоры и ячейки по таблице мистического ловкача); известные
              заклинания 1+ уровня — школы Иллюзии и Очарования; базовая характеристика — Интеллект
            feature_type: spell
            requires_action: true
          - id: mage_hand_legerdemain
            name: Улучшенная волшебная рука
            description: 'Невидимая волшебная рука: воровские действия на расстоянии заклинания'
            feature_type: active
            requires_action: true
        9:
          grants:
          - id: magical_ambush
            name: Магическая засада
            description: Цель, отвлечённая вами, совершает с помехой спасброски от ваших иллюзий и очарований
            feature_type: passive
            requires_action: false
    progression:
      1:
        grants:
        - id: expertise
          name: Компетентность
          description: На 1 уровне выберите два владения в навыках или одно владение навыком и владение воровскими инструментами;
            бонус мастерства удваивается для выбранных владений
          feature_type: passive
          requires_action: false
          expertise_mechanics:
            grants:
            - level: 1
              pick: 2
              pool: proficient_skills
              alternatives:
              - pick: 1
                pool: proficient_skills
              - pick: 1
                pool: tools
                options:
                - thieves_tools
            - level: 6
              pick: 2
              pool: proficient_skills
        - id: sneak_attack
          name: Скрытая атака
          description: Дополнительный урон при атаке с преимуществом или когда противник рядом с союзником
          feature_type: passive
          requires_action: false
        - id: thieves_cant
          name: Воровской жаргон
          description: Понимание секретных языков и знаков
          feature_type: passive
          requires_action: false
      2:
        grants:
        - id: cunning_action
          name: Коварная атака
          description: Использование бонусного действия для атаки или уклонения
          feature_type: active
          requires_action: false
          bonus_action: true
      3:
        grants:
        - id: improved_sneak_attack
          name: Улучшенная скрытая атака
          description: Увеличение урона скрытой атаки
          feature_type: passive
          requires_action: false
      9:
        grants:
        - id: uncanny_dodge
          name: Улучшенная коварная атака
          description: Дополнительная атака при коварной атаке
          feature_type: active
          reaction: true
      4:
        grants:
        - id: ability_score_improvement
          name: Увеличение характеристик
          description: 'Увеличьте одну характеристику на 2 или две характеристики на 1 (макс. 20). Опционально: вместо этого
