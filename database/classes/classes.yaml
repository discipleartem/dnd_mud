  bard:
    name:
      ru: Бард
      en: Bard
    description: Вдохновляющий рассказчик и маг музыки. Барды используют музыку и слова для создания магических эффектов,
      вдохновляют союзников и влияют на умы окружающих.
    hit_dice: 8
    spellcasting: true
    spellcasting_level: 1
    subclass_choice_level: 3
    prime_ability: charisma
    skill_choices:
    - acrobatics
    - animal_handling
    - arcana
    - athletics
    - deception
    - history
    - insight
    - intimidation
    - investigation
    - medicine
    - nature
    - perception
    - persuasion
    - religion
    - sleight_of_hand
    - stealth
    - survival
    - performance
    skill_choices_count: 3
    equipment:
      weapons:
      - простые
      - ручные арбалеты
      - длинные мечи
      - рапиры
      - короткие мечи
      armor:
      - лёгкие
      tools:
      - три музыкальных инструмента
    proficiencies:
      weapons:
      - simple
      - hand_crossbow
      - longsword
      - rapier
      - shortsword
      armor:
      - light
      tools: []
      tool_choices:
      - count: 3
        pool: musical_instruments
    subclasses:
    - id: valor_college
      name:
        ru: Коллегия доблести
        en: College of Valor
      description: Бард-скальд, вдохновляющий героев в бою; владеет доспехами и оружием.
      parent_class: bard
      class_features:
      - id: bonus_proficiencies_valor
        name: Бонусное владение
        description: Средние доспехи, щиты и воинское оружие
        level: 3
        feature_type: passive
        requires_action: false
        mechanics:
          type: armor_proficiency
          armor_types:
          - medium
          - shield
          weapons:
          - martial
      - id: combat_inspiration
        name: Боевое вдохновение
        description: Кость вдохновения барда добавляется к урону оружием или КД
        level: 3
        feature_type: active
        bonus_action: true
        requires_action: false
      - id: extra_attack_valor
        name: Дополнительная атака
        description: Две атаки при действии Атака
        level: 6
        feature_type: passive
        requires_action: false
    - id: lore_college
      name:
        ru: Коллегия знаний
        en: College of Lore
      description: Бард-хранитель знаний, мастер очарования и контрзаклинаний.
      parent_class: bard
      class_features:
      - id: bonus_proficiencies_lore
        name: Дополнительные навыки
        description: Владение тремя дополнительными навыками на выбор
        level: 3
        feature_type: passive
        requires_action: false
        mechanics:
          type: skill_proficiency
          count: 3
          choice: true
          from_list: all
      - id: cutting_words
        name: Острое словцо
        description: Реакцией вычесть кость вдохновения из броска атаки, урона или проверки врага
        level: 3
        feature_type: active
        reaction: true
        requires_action: false
      - id: additional_magical_secrets
        name: Дополнительные тайны магии
        description: Два заклинания из любого класса; ячейки барда
        level: 6
        feature_type: spell
        requires_action: true
    class_features:
    - id: spellcasting_bard
      name: Использование заклинаний
      description: Магия воли и музыки; заговоры и ячейки заклинаний барда по таблице класса; базовая характеристика — Харизма
      level: 1
      feature_type: spell
      requires_action: true
    - id: bardic_inspiration
      name: Вдохновение барда
      description: Бонусным действием дать союзнику в 60 фт. кость вдохновения (к6); один раз добавить к проверке, атаке или
        спасброску. Использований = мод. Харизмы (мин. 1), восстановление после продолжительного отдыха; кость растёт на 5/10/15
        ур.
      level: 1
      feature_type: active
      uses_per_rest: 1
      bonus_action: true
      requires_action: false
    - id: jack_of_all_trades
      name: Мастер на все руки
      description: Половина бонуса мастерства, округлённая в меньшую сторону, ко всем проверкам характеристик, куда этот бонус
        ещё не включён
      level: 2
      feature_type: passive
      requires_action: false
    - id: song_of_rest
      name: Песнь отдыха
      description: В конце короткого отдыха союзники, потратившие хотя бы одну Кость Хитов, восстанавливают дополнительно
        1к6 хитов (к8 на 9 ур., к10 на 13, к12 на 17)
      level: 2
      feature_type: passive
      requires_action: false
    - id: expertise_bard
      name: Компетентность
      description: 'Выберите 2 владеемых навыка: бонус мастерства для них удваивается; на 10 уровне — ещё 2 навыка'
      level: 3
      feature_type: passive
      requires_action: false
      expertise_mechanics:
        grants:
        - level: 3
          pick: 2
          pool: proficient_skills
        - level: 10
          pick: 2
          pool: proficient_skills
    - id: font_of_inspiration
      name: Источник вдохновения
      description: Вдохновение барда восстанавливается после короткого и продолжительного отдыха
      level: 5
      feature_type: passive
      requires_action: false
    - id: countercharm
      name: Контрочарование
      description: 'Действием: до конца следующего хода вы и союзники в 30 фт. с преимуществом на спасброски от запугивания
