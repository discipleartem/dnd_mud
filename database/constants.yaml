# Константы и метаданные D&D 5e
# Вынесены из abilities.yaml, languages.yaml, skills.yaml

constants:
  # Модификаторы характеристик (значение характеристики → модификатор)
  ability_modifiers:
    1: -5
    2: -4
    3: -4
    4: -3
    5: -3
    6: -2
    7: -2
    8: -1
    9: -1
    10: 0
    11: 0
    12: 1
    13: 1
    14: 2
    15: 2
    16: 3
    17: 3
    18: 4
    19: 4
    20: 5
    21: 5
    22: 6
    23: 6
    24: 7
    25: 7
    26: 8
    27: 8
    28: 9
    29: 9
    30: 10

  # Значения кубиков хитов по классам (id класса → грани кубика)
  hit_dice:
    barbarian: 12
    fighter: 10
    paladin: 10
    ranger: 10
    bard: 8
    cleric: 8
    druid: 8
    monk: 8
    rogue: 8
    warlock: 8
    sorcerer: 6
    wizard: 6

  # Классы сложности (DC)
  difficulty_classes:
    trivial: 0
    easy: 5
    medium: 10
    hard: 15
    very_hard: 20
    nearly_impossible: 25
    impossible: 30

  # Типы языков
  language_types:
    standard: "Стандартные языки"
    exotic: "Экзотические языки"
    secret: "Секретные языки"
    elemental: "Элементальные языки"
    planar: "Планарные языки"

  # Сложность изучения языков
  language_difficulties:
    easy: 1
    normal: 2
    hard: 3
    very_hard: 4

  # Системные алфавиты
  scripts:
    common:
      name: "Общий алфавит"
      languages: ["common", "halfling"]
    elvish:
      name: "Эльфийский алфавит"
      languages: ["elvish", "sylvan", "undercommon"]
    dwarvish:
      name: "Дварфийский алфавит"
      languages: ["dwarvish", "orcish", "gnomish", "primordial"]
    draconic:
      name: "Драконий алфавит"
      languages: ["draconic"]
    infernal:
      name: "Инфернальный алфавит"
      languages: ["infernal", "abyssal"]
    celestial:
      name: "Небесный алфавит"
      languages: ["celestial"]

  # Перечисление размеров существ
  sizes:
    tiny: "Крошечный"
    small: "Маленький"
    medium: "Средний"
    large: "Большой"
    huge: "Огромный"
    gargantuan: "Гигантский"

  # Перечисление характеристик
  abilities_enum:
    strength: "Сила"
    dexterity: "Ловкость"
    constitution: "Выносливость"
    intelligence: "Интеллект"
    wisdom: "Мудрость"
    charisma: "Харизма"

  # Ситуационные модификаторы
  situational_modifiers:
    advantage:
      description: "Преимущество — бросаем 2d20 и берём лучший"
    disadvantage:
      description: "Помеха — бросаем 2d20 и берём худший"
    cover:
      half: 2
      three_quarters: 5
      full: "Преимущество на спасброски"