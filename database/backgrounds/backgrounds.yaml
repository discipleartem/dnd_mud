    - type: skill_proficiency
      skills:
      - deception
      - stealth
    - type: tool_proficiency
      tools:
      - thieves_tools
    - type: tool_proficiency
      count: 1
      choice: true
      pool: gaming_sets
  entertainer:
    name:
      ru: Артист
      en: Entertainer
    description:
      ru: Странствующий артист, мастер выступлений.
      en: A traveling performer skilled in the performing arts.
    skills:
    - acrobatics
    - performance
    languages: {}
