      en:
      - musical instrument
      - admiration gift
      - costume
      - 2 gp
    feature:
      name:
        ru: По многочисленным просьбам
        en: By Popular Demand
      description:
        ru: Можете найти место для выступления в таверне или постоялом дворе.
        en: You can always find a place to perform at an inn or tavern.
