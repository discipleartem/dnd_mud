backgrounds:
  acolyte:
    name:
      ru: Прислужник
      en: Acolyte
    description:
      ru: Служитель храма, посвящённого богу или пантеону.
      en: A temple servant devoted to a god or pantheon.
    skills:
    - insight
    - religion
    languages:
      count: 2
      choice: true
      pool: common
    tools: []
    tool_proficiencies:
      fixed: []
    equipment:
      ru:
      - священный символ
      - молитвенник
      - 5 палочек благовоний
      - облачение
      - обычная одежда
      - 15 зм
      en:
      - holy symbol
      - prayer book
      - 5 incense sticks
      - vestments
      - common clothes
      - 15 gp
    feature:
      name:
        ru: Приют для верующих
        en: Shelter of the Faithful
      description:
        ru: Бесплатный уход в храмах вашей веры; скромное содержание от единоверцев.
        en: Free care at temples of your faith; modest support from the faithful.
    grants:
    - type: skill_proficiency
      skills:
      - insight
      - religion
    - type: language
      count: 2
      choice: true
      pool: common
  charlatan:
    name:
      ru: Шарлатан
      en: Charlatan
    description:
      ru: Мастер обмана, интриг и подделок.
      en: A master of deception, intrigue, and forgery.
    skills:
    - sleight_of_hand
    - deception
    languages: {}
    tools:
      ru:
      - набор для грима
      - набор для фальсификации
      en:
      - disguise kit
      - forgery kit
    tool_proficiencies:
      fixed:
      - disguise_kit
      - forgery_kit
    equipment:
      ru:
      - отличная одежда
      - набор для грима
      - приспособление для жульничества
      - 15 зм
      en:
      - fine clothes
      - disguise kit
      - con tool
      - 15 gp
    feature:
      name:
        ru: Поддельная личность
        en: False Identity
      description:
        ru: Вторая личность с документами и знакомствами; подделка официальных бумаг.
        en: A second identity with documents and contacts; forge official papers.
    grants:
    - type: skill_proficiency
      skills:
      - sleight_of_hand
      - deception
    - type: tool_proficiency
      tools:
      - disguise_kit
    - type: tool_proficiency
      tools:
      - forgery_kit
  criminal:
    name:
      ru: Преступник
      en: Criminal
    description:
      ru: Преступник с тёмным прошлым, привыкший жить вне закона.
      en: An outlaw accustomed to living outside the law.
    skills:
    - deception
    - stealth
    languages: {}
    tools:
      ru:
      - воровские инструменты
      - один игровой набор
      en:
      - thieves' tools
      - one gaming set
    tool_proficiencies:
      fixed:
      - thieves_tools
      choices:
      - count: 1
        pool: gaming_sets
    equipment:
      ru:
      - ломик
      - тёмная одежда с капюшоном
      - 15 зм
      en:
      - crowbar
      - dark common clothes with hood
      - 15 gp
    feature:
      name:
        ru: Криминальные связи
        en: Criminal Contact
      description:
        ru: Надёжный связной в криминальных кругах для получения и передачи сведений.
        en: A reliable contact in criminal circles for sending and receiving information.
