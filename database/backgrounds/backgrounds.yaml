backgrounds:
  acolyte:
    name:
      ru: Прислужник
      en: Acolyte
    description:
      ru: Служитель храма, посвящённого богу или пантеону.
      en: A temple servant devoted to a god or pantheon.
    equipment:
      ru:
      - священный символ
      - молитвенник
      - 5 палочек благовоний
      - облачение
      - обычная одежда
      - 15 зм
      en:
      - holy symbol
      - prayer book
      - 5 incense sticks
      - vestments
      - common clothes
      - 15 gp
    feature:
      name:
        ru: Приют для верующих
        en: Shelter of the Faithful
      description:
        ru: Бесплатный уход в храмах вашей веры; скромное содержание от единоверцев.
        en: Free care at temples of your faith; modest support from the faithful.
    grants:
    - type: skill_proficiency
      skills:
      - insight
      - religion
    - type: language
      count: 2
      choice: true
      pool: common
    - type: equipment_item
      items:
      - { kind: equipment, id: emblem, qty: 1 }
      - { kind: equipment, id: book, qty: 1 }
      - { kind: equipment, id: incense, qty: 5 }
      - { kind: equipment, id: vestments, qty: 1 }
      - { kind: equipment, id: common_clothes, qty: 1 }
  charlatan:
    name:
      ru: Шарлатан
      en: Charlatan
    description:
      ru: Мастер обмана, интриг и подделок.
      en: A master of deception, intrigue, and forgery.
    equipment:
      ru:
      - отличная одежда
      - набор для грима
      - приспособление для жульничества
      - 15 зм
      en:
      - fine clothes
      - disguise kit
      - con tool
      - 15 gp
    feature:
      name:
        ru: Поддельная личность
        en: False Identity
      description:
        ru: Вторая личность с документами и знакомствами; подделка официальных бумаг.
        en: A second identity with documents and contacts; forge official papers.
    grants:
    - type: skill_proficiency
      skills:
      - sleight_of_hand
      - deception
    - type: tool_proficiency
      tools:
      - disguise_kit
    - type: tool_proficiency
      tools:
      - forgery_kit
    - type: equipment_item
      items:
      - { kind: equipment, id: fine_clothes, qty: 1 }
      - { kind: tool, id: disguise_kit, qty: 1 }
      - { kind: tool, id: forgery_kit, qty: 1 }
  criminal:
    name:
      ru: Преступник
      en: Criminal
    description:
      ru: Преступник с тёмным прошлым, привыкший жить вне закона.
      en: An outlaw accustomed to living outside the law.
    equipment:
      ru:
      - ломик
      - тёмная одежда с капюшоном
      - 15 зм
      en:
      - crowbar
      - dark common clothes with hood
      - 15 gp
    feature:
      name:
        ru: Криминальные связи
        en: Criminal Contact
      description:
        ru: Надёжный связной в криминальных кругах для получения и передачи сведений.
        en: A reliable contact in criminal circles for sending and receiving information.
    grants:
    - type: skill_proficiency
      skills:
      - deception
      - stealth
    - type: tool_proficiency
      tools:
      - thieves_tools
    - type: tool_proficiency
      count: 1
      choice: true
      pool: gaming_sets
    - type: equipment_item
      items:
      - { kind: equipment, id: crowbar, qty: 1 }
      - { kind: equipment, id: common_clothes, qty: 1 }
      - { kind: tool, id: thieves_tools, qty: 1 }
  entertainer:
    name:
      ru: Артист
      en: Entertainer
    description:
      ru: Странствующий артист, мастер выступлений.
      en: A traveling performer skilled in the performing arts.
    equipment:
      ru:
      - музыкальный инструмент
      - подарок от поклонника
      - костюм
      - 2 зм
      en:
      - musical instrument
      - admiration gift
      - costume
      - 2 gp
    feature:
      name:
        ru: По многочисленным просьбам
        en: By Popular Demand
      description:
        ru: Можете найти место для выступления в таверне или постоялом дворе.
        en: You can always find a place to perform at an inn or tavern.
    grants:
    - type: skill_proficiency
      skills:
      - acrobatics
      - performance
    - type: tool_proficiency
      tools:
      - disguise_kit
    - type: tool_proficiency
      count: 1
      choice: true
      pool: musical_instruments
    - type: equipment_item
      items:
      - { kind: equipment, id: trinket, qty: 1 }
      - { kind: equipment, id: costume, qty: 1 }
  folk_hero:
    name:
      ru: Народный герой
      en: Folk Hero
    description:
      ru: Защитник простых людей из народа.
      en: A champion of the common folk.
    equipment:
      ru:
      - ремесленные инструменты
      - лопата
      - горшок
      - обычная одежда
      - 10 зм
      en:
      - artisan's tools
      - shovel
      - iron pot
      - common clothes
      - 10 gp
    feature:
      name:
        ru: Деревенское гостеприимство
        en: Rustic Hospitality
      description:
        ru: Среди простых людей легко найти укрытие, отдых и помощь.
        en: Among common folk you can find shelter, rest, and aid.
    grants:
    - type: skill_proficiency
      skills:
      - survival
      - animal_handling
    - type: tool_proficiency
      tools:
      - land_vehicles
    - type: tool_proficiency
      count: 1
      choice: true
      pool: artisans_tools
    - type: equipment_item
      items:
      - { kind: equipment, id: shovel, qty: 1 }
      - { kind: equipment, id: iron_pot, qty: 1 }
      - { kind: equipment, id: common_clothes, qty: 1 }
  guild_artisan:
    name:
      ru: Гильдейский ремесленник
      en: Guild Artisan
    description:
      ru: Член гильдии ремесленников, мастер своего дела.
      en: A member of a guild of artisans and master crafters.
    equipment:
      ru:
      - ремесленные инструменты
      - рекомендательное письмо гильдии
      - дорожная одежда
      - 15 зм
      en:
      - artisan's tools
      - guild letter of introduction
      - traveler's clothes
      - 15 gp
    feature:
      name:
        ru: Членство в гильдии
        en: Guild Membership
      description:
        ru: Союзники гильдии обеспечат жильё, питание и связи в городах.
        en: Guild allies provide lodging, food, and connections in cities.
    grants:
    - type: skill_proficiency
      skills:
      - insight
      - persuasion
    - type: language
      count: 1
      choice: true
      pool: common
    - type: tool_proficiency
      count: 1
      choice: true
      pool: artisans_tools
    - type: equipment_item
      items:
      - { kind: equipment, id: guild_letter, qty: 1 }
      - { kind: equipment, id: travelers_clothes, qty: 1 }
  hermit:
    name:
      ru: Отшельник
      en: Hermit
    description:
      ru: Живущий в уединении искатель истины.
      en: A recluse who lived in seclusion seeking truth.
    equipment:
      ru:
      - контейнер для свитков
      - одеяло
      - обычная одежда
      - набор травника
      - 5 зм
      en:
      - scroll case
      - blanket
      - common clothes
      - herbalism kit
      - 5 gp
    feature:
      name:
        ru: Откровение
        en: Discovery
      description:
        ru: Тихое уединение дало вам великое откровение — тайну вселенной или прошлого.
        en: Seclusion granted you a great discovery about the cosmos or the past.
    grants:
    - type: skill_proficiency
      skills:
      - medicine
      - religion
    - type: language
      count: 1
      choice: true
      pool: common
    - type: tool_proficiency
      tools:
      - herbalism_kit
    - type: equipment_item
      items:
      - { kind: equipment, id: map_case, qty: 1 }
      - { kind: equipment, id: bedroll, qty: 1 }
      - { kind: equipment, id: common_clothes, qty: 1 }
      - { kind: tool, id: herbalism_kit, qty: 1 }
  noble:
    name:
      ru: Благородный
      en: Noble
    description:
      ru: Представитель знатного рода.
      en: Scion of a noble family.
    equipment:
      ru:
      - отличная одежда
      - кольцо-печатка
      - свиток родословной
      - 25 зм
      en:
      - fine clothes
      - signet ring
      - scroll of pedigree
      - 25 gp
    feature:
      name:
        ru: Привилегированность
        en: Position of Privilege
      description:
        ru: Высшее общество принимает вас; люди стремятся угодить.
        en: High society welcomes you; people seek to please you.
    grants:
    - type: skill_proficiency
      skills:
      - history
      - persuasion
    - type: language
      count: 1
      choice: true
      pool: common
    - type: tool_proficiency
      count: 1
      choice: true
      pool: gaming_sets
    - type: equipment_item
      items:
      - { kind: equipment, id: fine_clothes, qty: 1 }
      - { kind: equipment, id: signet_ring, qty: 1 }
      - { kind: equipment, id: letter, qty: 1 }
  outlander:
    name:
      ru: Чужеземец
      en: Outlander
    description:
      ru: Выросший в глуши, вдали от цивилизации.
      en: Raised in the wilds, far from civilization.
    equipment:
      ru:
      - посох
      - капкан
      - трофей
      - одежда путешественника
      - 10 зм
      en:
      - staff
      - hunting trap
      - trophy
      - traveler's clothes
      - 10 gp
    feature:
      name:
        ru: Странник
        en: Wanderer
      description:
        ru: Отличная память на местность; еда и вода для себя и пятерых спутников.
        en: Excellent map memory; find food and water for yourself and five others.
    grants:
    - type: skill_proficiency
      skills:
      - athletics
      - survival
    - type: language
      count: 1
      choice: true
      pool: common
    - type: tool_proficiency
      count: 1
      choice: true
      pool: musical_instruments
    - type: equipment_item
      items:
      - { kind: weapon, id: quarterstaff, qty: 1 }
      - { kind: equipment, id: hunting_trap, qty: 1 }
      - { kind: equipment, id: trophy, qty: 1 }
      - { kind: equipment, id: travelers_clothes, qty: 1 }
  sage:
    name:
      ru: Мудрец
      en: Sage
    description:
      ru: Учёный, посвятивший жизнь знаниям.
      en: A scholar devoted to knowledge.
    equipment:
      ru:
      - чёрнильница
      - перо
      - пергамент
      - маленький нож
      - письмо от поклонника
      - обычная одежда
      - 10 зм
      en:
      - ink
      - quill
      - parchment
      - small knife
      - letter from colleague
      - common clothes
      - 10 gp
    feature:
      name:
        ru: Исследователь
        en: Researcher
      description:
        ru: Зная язык, можете найти сведения, если они записаны где-либо.
        en: If lore exists in written form, you know where to find it.
    grants:
    - type: skill_proficiency
      skills:
      - history
      - arcana
    - type: language
      count: 2
      choice: true
      pool: common
    - type: equipment_item
      items:
      - { kind: equipment, id: ink, qty: 1 }
      - { kind: equipment, id: quill, qty: 1 }
      - { kind: equipment, id: paper, qty: 1 }
      - { kind: weapon, id: dagger, qty: 1 }
      - { kind: equipment, id: letter, qty: 1 }
      - { kind: equipment, id: common_clothes, qty: 1 }
  sailor:
    name:
      ru: Моряк
      en: Sailor
    description:
      ru: Мореплаватель, проведший годы на корабле.
      en: A seafarer who spent years aboard ship.
    equipment:
      ru:
      - бelaying pin
      - 50 футов шёлковой верёвки
      - талисман
      - обычная одежда
      - 10 зм
      en:
      - belaying pin
      - 50 feet silk rope
      - lucky charm
      - common clothes
      - 10 gp
    feature:
      name:
        ru: Поездка на корабле
        en: Ship's Passage
      description:
        ru: Можете получить бесплатный проезд на паруснике для себя и спутников.
        en: Secure free passage on a sailing ship for you and your companions.
    grants:
    - type: skill_proficiency
      skills:
      - athletics
      - perception
    - type: tool_proficiency
      tools:
      - navigator_tools
    - type: tool_proficiency
      tools:
      - water_vehicles
    - type: equipment_item
      items:
      - { kind: weapon, id: club, qty: 1 }
      - { kind: equipment, id: silk_rope, qty: 1 }
      - { kind: equipment, id: trinket, qty: 1 }
      - { kind: equipment, id: common_clothes, qty: 1 }
  soldier:
    name:
      ru: Солдат
      en: Soldier
    description:
      ru: Ветеран военных конфликтов.
      en: A veteran of military campaigns.
    equipment:
      ru:
      - знак отличия
      - трофей
      - игровой набор
      - обычная одежда
      - 10 зм
      en:
      - insignia of rank
      - trophy
      - gaming set
      - common clothes
      - 10 gp
    feature:
      name:
        ru: Воинское звание
        en: Military Rank
      description:
        ru: Солдаты уважают ваше звание; можете получить доступ к лагерям и казармам.
        en: Soldiers respect your rank; access to camps and fortresses.
    grants:
    - type: skill_proficiency
      skills:
      - athletics
      - intimidation
    - type: tool_proficiency
      tools:
      - land_vehicles
    - type: tool_proficiency
      count: 1
      choice: true
      pool: gaming_sets
    - type: equipment_item
      items:
      - { kind: equipment, id: emblem, qty: 1 }
      - { kind: equipment, id: trophy, qty: 1 }
      - { kind: equipment, id: common_clothes, qty: 1 }
  urchin:
    name:
      ru: Беспризорник
      en: Urchin
    description:
      ru: Выросший на улицах города.
      en: Grew up on the city streets.
    equipment:
      ru:
      - маленький нож
      - карта города
      - ручная крыса
      - безделушка родителей
      - обычная одежда
      - 10 зм
      en:
      - small knife
      - city map
      - pet mouse
      - parent token
      - common clothes
      - 10 gp
    feature:
      name:
        ru: Городские тайны
        en: City Secrets
      description:
        ru: Знаете секретные ходы и тайные маршруты города.
        en: You know the secret passages and hidden routes of cities.
    grants:
    - type: skill_proficiency
      skills:
      - sleight_of_hand
      - stealth
    - type: tool_proficiency
      tools:
      - thieves_tools
    - type: tool_proficiency
      tools:
      - disguise_kit
    - type: equipment_item
      items:
      - { kind: weapon, id: dagger, qty: 1 }
      - { kind: equipment, id: map_case, qty: 1 }
      - { kind: equipment, id: trinket, qty: 1 }
      - { kind: equipment, id: common_clothes, qty: 1 }
