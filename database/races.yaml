# База данных рас D&D 5e
# Стандартный формат для экспорта/импорта данных о расах и subraces:ах
# 
# Структура документа:
# - races: базовые расы с вложенными subraces:ами
# - features: библиотека особенностей (переиспользуемые)

races:
  human:
    name: "Человек"
    description: "Человечество - самая разнообразная и амбициозная раса"
    age_range: [16, 100]
    size: "medium"
    speed: 30
    languages: ["common"]
    ability_bonuses:
      strength: 1
      dexterity: 1
      constitution: 1
      intelligence: 1
      wisdom: 1
      charisma: 1
    features:
      - ref: "additional_language"
    allow_base_race_choice: true
    subraces:
      variant_human:
        name: "Человек (вариант)"
        description: "Альтернативный вариант создания человека"
        inherit_base_bonuses: false
        inherit_base_features: false
        ability_bonuses: {}  # Выбираются при создании
        features:
          - ref: "ability_score_increase_choice"
          - ref: "skill_proficiency_choice"
          - ref: "feat_choice"

  elf:
    name: "Эльф"
    description: "Эльфы - изящные и долгоживущие существа с тонкими чувствами"
    age_range: [20, 750]
    size: "medium"
    speed: 30
    languages: ["common", "elvish"]
    ability_bonuses:
      dexterity: 2
    features:
      - ref: "keen_senses"
      - ref: "darkvision_60"
      - ref: "fey_ancestry"
      - ref: "trance"
    allow_base_race_choice: false
    subraces:
      high_elf:
        name: "Высший эльф"
        description: "Высшие эльфы ценят знания и магию"
        ability_bonuses:
          intelligence: 1
        features:
          - ref: "elf_weapon_training"
          - ref: "additional_language"
          - ref: "high_elf_cantrip"

      wood_elf:
        name: "Лесной эльф"
        description: "Лесные эльфы живут в гармонии с природой"
        ability_bonuses:
          wisdom: 1
        speed: 35
        features:
          - ref: "elf_weapon_training"
          - ref: "fleet_of_foot"
          - ref: "mask_of_the_wild"

      dark_elf_drow:
        name: "Дроу"
        description: "Тёмные эльфы подземелий"
        ability_bonuses:
          charisma: 1
        features:
          - ref: "drow_magic"
          - ref: "drow_weapon_training"
          - ref: "sunlight_sensitivity"

  dwarf:
    name: "Дварф"
    description: "Дварфы - крепкие и выносливые мастера гор и ремёсел"
    age_range: [50, 350]
    size: "medium"
    speed: 25
    languages: ["common", "dwarvish"]
    ability_bonuses:
      constitution: 2
    features:
      - ref: "darkvision_60"
      - ref: "dwarven_resilience"
      - ref: "stonecunning"
      - ref: "dwarven_combat_training"
    allow_base_race_choice: false
    subraces:
      hill_dwarf:
        name: "Холмовой дварф"
        description: "Холмовые дварфы обладают мудростью и выносливостью"
        ability_bonuses:
          wisdom: 1
        features:
          - ref: "dwarven_toughness"

      mountain_dwarf:
        name: "Горный дварф"
        description: "Горные дварфы - сильные воины"
        ability_bonuses:
          strength: 2
        features:
          - ref: "dwarven_armor_training"


  half_orc:
    name: "Полуорк"
    description: "Полуорки - сильные и выносливые воины"
    age_range: [14, 80]
    size: "medium"
    speed: 30
    languages: ["common", "orcish"]
    ability_bonuses:
      strength: 2
      constitution: 1
    features:
      - ref: "relentless_endurance"
      - ref: "savage_attacks"
    allow_base_race_choice: true



# Библиотека переиспользуемых особенностей
features:
  # Чувства и восприятие
  keen_senses:
    name: "Обострённые чувства"
    description: "Вы владеете навыком Внимательность"
    type: "skill_proficiency"
    mechanics:
      skills: ["perception"]

  darkvision_60:
    name: "Тёмное зрение"
    description: "Можете видеть в условиях слабого освещения на расстоянии 60 футов как в ярком освещении"
    type: "darkvision"
    mechanics:
      range: 60

  # Сопротивления и защиты
  dwarven_resilience:
    name: "Дварфская стойкость"
    description: "Вы имеете преимущество при спасбросках от яда и сопротивление урону ядом"
    type: "resistance"
    mechanics:
      damage_types: ["poison"]
      advantage_saves: ["poison"]

  hellish_resistance:
    name: "Адская стойкость"
    description: "Вы имеете сопротивление урону огнем"
    type: "resistance"
    mechanics:
      damage_types: ["fire"]

  damage_resistance:
    name: "Сопротивление урону"
    description: "Вы имеете сопротивление урону вашего типа дракона"
    type: "resistance"
    mechanics:
      damage_types: ["acid", "cold", "fire", "lightning", "poison"]  # Выбирается при создании
      choice: true
      count: 1

  # Бонусы и преимущества
  fey_ancestry:
    name: "Наследие фей"
    description: "Преимущество при спасбросках от очарования"
    type: "advantage"
    mechanics:
      save: "charisma"
      effect: "charm"

  lucky:
    name: "Везучий"
    description: "Когда бросаете 1 на кубике броска, атаки или спасброска, можете перебросить его и должны использовать новый результат"
    type: "lucky"
    mechanics:
      trigger: "natural_1"
      reroll: true

  brave:
    name: "Храбрый"
    description: "Вы имеете преимущество при спасбросках от испуга"
    type: "advantage"
    mechanics:
      save: "wisdom"
      effect: "frightened"

  # Навыки и владение
  skill_versatility:
    name: "Мастерство навыков"
    description: "Вы получаете владение двумя навыками на ваш выбор"
    type: "skill_proficiency"
    mechanics:
      count: 2
      choice: true

  additional_language:
    name: "Дополнительный язык"
    description: "Вы можете говорить, читать и писать на одном дополнительном языке на ваш выбор"
    type: "language"
    mechanics:
      count: 1
      choice: true

  # Особые способности
  trance:
    name: "Транс"
    description: "Медитация вместо сна. 4 часа медитации дают тот же отдых, что и 8 часов сна"
    type: "rest"
    mechanics:
      duration: 4
      effect: "full_rest"

  relentless_endurance:
    name: "Непреклонность"
    description: "Когда урон снижает ваши хиты до 0, вы остаётесь с 1 хитом"
    type: "persistent_endurance"
    mechanics:
      trigger: "damage_reduces_to_zero"
      effect: "remain_at_1_hp"

  savage_attacks:
    name: "Дикие атаки"
    description: "Когда вы наносите критический удар оружием, вы можете перебросить один из кубиков урона"
    type: "damage_bonus"
    mechanics:
      trigger: "critical_hit"
      effect: "reroll_one_damage_die"

  breath_weapon:
    name: "Дыхание дракона"
    description: "Вы можете использовать дыхание дракона как действие"
    type: "breath_weapon"
    mechanics:
      damage_types: ["acid", "cold", "fire", "lightning", "poison"]  # Выбирается при создании
      shape: "cone"  # или "line"
      size: 15  # футов
      damage: "2d6"
      recharge: "short_rest"
      choice: true
      count: 1

  # Магические способности
  innate_spellcasting:
    name: "Врождённая магия"
    description: "Вы знаете заговоры и можете использовать их определённое количество раз"
    type: "spellcasting"
    mechanics:
      spells:
        - name: "thaumaturgy"
          level: 0
          uses: "at_will"
        - name: "hellish_rebuke"
          level: 1
          uses: 1
          recharge: "long_rest"
      ability: "charisma"

  drow_magic:
    name: "Магия дроу"
    description: "Вы знаете магию дроу"
    type: "spellcasting"
    mechanics:
      spells:
        - name: "dancing_lights"
          level: 0
          uses: "at_will"
        - name: "faerie_fire"
          level: 1
          uses: 1
          recharge: "long_rest"
        - name: "darkness"
          level: 2
          uses: 1
          recharge: "long_rest"
      ability: "charisma"

  high_elf_cantrip:
    name: "Заговор высшего эльфа"
    description: "Вы знаете один заговор из списка волшебника"
    type: "cantrip"
    mechanics:
      source: "wizard"
      ability: "intelligence"
      count: 1
      choice: true

  natural_illusionist:
    name: "Природный иллюзионист"
    description: "Вы знаете заговор minor illusion"
    type: "cantrip"
    mechanics:
      spell: "minor illusion"
      ability: "intelligence"

  # Выборы при создании
  ability_score_increase_choice:
    name: "Увеличение характеристик"
    description: "Значение двух характеристик на ваш выбор увеличивается на 1"
    type: "ability_bonus"
    mechanics:
      count: 2
      value: 1
      choice: true
      choice_type: "ability_score"
      allow_duplicates: false  # Нельзя выбирать одну характеристику дважды

  skill_proficiency_choice:
    name: "Навыки"
    description: "Вы получаете владение одним навыком на ваш выбор"
    type: "skill_proficiency"
    mechanics:
      count: 1
      choice: true
      choice_type: "skill"
      from_list: "all"  # Из всех навыков

  feat_choice:
    name: "Черта"
    description: "Вы получаете одну черту на ваш выбор"
    type: "feat"
    mechanics:
      count: 1
      choice: true
      choice_type: "feat"
      from_list: "all"  # Из всех доступных черт

  # Движение и скорость
  fleet_of_foot:
    name: "Быстрота"
    description: "Базовая скорость передвижения 35 футов"
    type: "speed_bonus"
    mechanics:
      value: 35

  # Скрытность и маскировка
  naturally_stealthy:
    name: "Природная скрытность"
    description: "Вы можете попытаться скрыться, даже если вас прикрывает только существо большего размера"
    type: "stealth_bonus"
    mechanics:
      condition: "behind_large_creature"

  mask_of_the_wild:
    name: "Маскировка лесного эльфа"
    description: "Преимущество при проверках Ловкости (Скрытность) в лесистой местности"
    type: "advantage"
    mechanics:
      skill: "stealth"
      terrain: "forest"

  # Инструменты и ремёсла
  stonecunning:
    name: "Камнерезание"
    description: "При проверке Интеллекта (История) о происхождении каменных конструкций вы добавляете преимущество"
    type: "skill_bonus"
    mechanics:
      skill: "history"
      context: "stone_structures"
      advantage: true

  tinker:
    name: "Механик"
    description: "Вы владеете ремесленными инструментами механика"
    type: "tool_proficiency"
    mechanics:
      tools: ["tinkers_tools"]

  artificers_lore:
    name: "Знания искусника"
    description: "При проверке Интеллекта (История) о магических предметах вы добавляете преимущество"
    type: "skill_bonus"
    mechanics:
      skill: "history"
      context: "magic_items"
      advantage: true

  speak_with_small_beasts:
    name: "Разговор с маленькими животными"
    description: "Можете общаться с маленькими зверями"
    type: "communication"
    mechanics:
      targets: "small_beasts"

  # Владение оружием
  dwarven_combat_training:
    name: "Дварфская боевая подготовка"
    description: "Владение боевым топором, ручным топором, лёгким молотом и боевым молотом"
    type: "weapon_proficiency"
    mechanics:
      weapons: ["battleaxe", "handaxe", "light_hammer", "warhammer"]

  elf_weapon_training:
    name: "Эльфийская боевая подготовка"
    description: "Владение длинными мечами, рапирами, короткими мечами, длинными и короткими луками"
    type: "weapon_proficiency"
    mechanics:
      weapons: ["longsword", "rapier", "shortsword", "longbow", "shortbow"]

  drow_weapon_training:
    name: "Боевая подготовка дроу"
    description: "Владение рапирами, короткими мечами и арбалетами"
    type: "weapon_proficiency"
    mechanics:
      weapons: ["rapier", "shortsword", "hand_crossbow"]

  # Особые условия
  sunlight_sensitivity:
    name: "Чувствительность к солнечному свету"
    description: "Недостаток при атаках и проверках мудрости (Внимательность) при прямом солнечном свете"
    type: "disadvantage"
    mechanics:
      condition: "direct_sunlight"
      affected: ["attacks", "perception_checks"]

  halfling_nimbleness:
    name: "Полуросликовая ловкость"
    description: "Можете перемещаться через пространство существа большего размера"
    type: "movement"
    mechanics:
      ability: "move_through_large_creatures"

  stout_resilience:
    name: "Крепкая стойкость"
    description: "Вы имеете преимущество при спасбросках от яда и сопротивление урону ядом"
    type: "resistance"
    mechanics:
      damage_types: ["poison"]
      advantage_saves: ["poison"]

  dwarven_armor_training:
    name: "Дварфская броневая подготовка"
    description: "Владение лёгкими и средними доспехами"
    type: "armor_proficiency"
    mechanics:
      armor_types: ["light_armor", "medium_armor"]

  dwarven_toughness:
    name: "Дварфская выносливость"
    description: "Увеличенные хиты на каждом уровне"
    type: "hit_point_bonus"
    mechanics:
      value: 1
      per_level: true
