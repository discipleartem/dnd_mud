# Черты Dungeons & Dragons 5e (PHB 2023 RUS, стр. 165–170)
# Базовые черты из Player's Handbook

feats:
  heavily_armored:
    name: Знаток тяжёлых доспехов
    description: Сила +1; владение тяжёлыми доспехами.
    requirements:
    - type: armor_proficiency
      armors:
      - medium
    ability_bonuses:
      strength: 1
    features:
    - name: Владение тяжёлыми доспехами
      description: Вы владеете тяжёлыми доспехами
      mechanics:
        type: armor_proficiency
        armors:
        - heavy
    description_full: 'Вы обучились ношению тяжёлых доспехов и получаете следующие преимущества:

      • Увеличьте значение Силы на 1, при максимуме 20.

      • Вы получаете владение тяжёлыми доспехами.

      '
  lightly_armored:
    name: Знаток лёгких доспехов
    description: Сила или Ловкость +1; владение лёгкими доспехами.
    features:
    - name: Владение лёгкими доспехами
      description: Вы владеете лёгкими доспехами
      mechanics:
        type: armor_proficiency
        armors:
        - light
    description_full: 'Вы обучились ношению лёгких доспехов и получаете следующие преимущества:

      • Увеличьте значение Силы или Ловкости на 1, при максимуме 20.

      • Вы получаете владение лёгкими доспехами.

      '
    ability_bonuses_choice:
    - strength
    - dexterity
    ability_bonuses_amount: 1
  moderately_armored:
    name: Знаток средних доспехов
    description: Сила или Ловкость +1; владение средними доспехами и щитами.
    requirements:
    - type: armor_proficiency
      armors:
      - light
    ability_bonuses_choice:
    - strength
    - dexterity
    ability_bonuses_amount: 1
    features:
    - name: Владение средними доспехами и щитами
      description: Вы владеете средними доспехами и щитами
      mechanics:
        type: armor_proficiency
        armors:
        - medium
        - shield
    description_full: 'Вы обучились ношению средних доспехов и щитов, и получаете следующие преимущества:

      • Увеличьте значение Силы или Ловкости на 1, при максимуме 20.

      • Вы получаете владение средними доспехами и щитами.

      '
  weapon_master:
    name: Мастер оружия
    description: Сила или Ловкость +1; владение четырьмя видами простого или воинского оружия.
    ability_bonuses_choice:
    - strength
    - dexterity
    ability_bonuses_amount: 1
    features:
    - name: Владение оружием
      description: Выберите четыре вида оружия
      mechanics:
        type: weapon_proficiency
        weapons: []
        choice: true
        count: 4
    description_full: 'Вы знаете как пользоваться множеством видов оружия и получаете следующие преимущества:

      • Увеличьте значение Силы или Ловкости на 1, при максимуме 20.

      • Вы получаете владение четырьмя выбранными видами оружия. Выбранное оружие должно быть или простым или воинским.

      '
  athlete:
    name: Атлетичный
    description: Сила или Ловкость +1; вставание с 5 фт.; лазание без штрафа; прыжок с разбега 5 фт.
    ability_bonuses_choice:
    - strength
    - dexterity
    ability_bonuses_amount: 1
    features:
    - name: Атлетичная подготовка
      description: Вставание, лазание и прыжки по правилам черты
      mechanics:
        type: athlete
    description_full: '• Увеличьте значение Силы или Ловкости на 1, при максимуме 20.

      • Если вы лежите ничком, вставание использует только 5 футов перемещения.

      • Лазание не заставляет вас тратить дополнительное перемещение.

      • Вы можете совершать прыжок в длину или высоту с разбега, переместившись только на 5 футов, а не на 10.

      '
  actor:
    name: Артистичный
    description: Харизма +1; преимущество на Выступление и Обман при маскировке; подражание речи и звукам.
    ability_bonuses:
      charisma: 1
    features:
    - name: Маскировка
      description: Преимущество на Выступление и Обман при выдаче себя за другого
      mechanics:
        type: advantage
        skills:
        - deception
        - performance
        context: disguise
    - name: Подражание
      description: Имитация речи и звуков после 1 минуты прослушивания
      mechanics:
        type: mimicry
    description_full: '• Увеличьте значение Харизмы на 1, при максимуме 20.

      • Вы совершаете с преимуществом проверки Харизмы (Выступление) и Харизма (Обман), когда пытаетесь выдать себя за кого-то
      другого.

      • Вы можете подражать речи кого-то другого, а также звукам, издаваемым другими существами. Перед этим вы должны как
      минимум в течение 1 минуты слышать чужую речь или звуки существа. Успешная проверка Мудрости (Проницательность), противопоставленная
      вашей проверке Харизмы (Обман), позволяет слушающему понять, что источник звука не настоящий.

      '
  charger:
    name: Налётчик
    description: После Рывка — бонусная атака или толчок; +5 урона или толчок на 10 фт. после 10 фт. по прямой.
    features:
    - name: Налёт
      description: Бонусная атака или толчок после Рывка
      mechanics:
        type: charger
        dash_bonus_action: true
        charge_damage_bonus: 5
    description_full: '• Когда вы используете действие Рывок, вы можете бонусным действием совершить одну рукопашную атаку
      оружием или оттолкнуть другое существо.

      • Если вы перед совершением этого бонусного действия переместились минимум на 10 футов по прямой линии, вы либо получаете
      бонус +5 к броску урона этой атаки (если вы решили совершить рукопашную атаку и попали), либо толкаете цель на 10 футов
      от себя (если решили толкать и преуспели).

      '
  crossbow_expert:
    name: Эксперт в арбалетах
    description: Игнор перезарядки; стрельба вблизи без помехи; бонусная атака ручным арбалетом после Атаки.
    features:
    - name: Мастерство арбалетов
      description: Игнорирование свойства загрузки, бонусная атака рукой после выстрела
      mechanics:
        type: weapon_mastery
        weapon_type: crossbow
        ignore_loading: true
        bonus_action_attack: true
    description_full: '• Благодаря обширной практике с арбалетом вы получаете следующие преимущества:

      • Вы игнорируете свойство «перезарядка» у арбалетов, которыми владеете.

      • Нахождение в пределах 5 футов от враждебного существа не накладывает помеху к вашим броскам дальнобойной атаки.

      • Когда вы используете действие Атака и атакуете одноручным оружием, вы можете бонусным действием атаковать заряженным
      ручным арбалетом, находящимся в руке.

      '
  defensive_duelist:
    name: Оборонительный дуэлянт
    description: Реакцией добавить бонус мастерства к КД против рукопашной атаки с фехтовальным оружием.
    requirements:
    - type: ability_score
      target: dexterity
      value: 13
    features:
    - name: Оборонительная реакция
      description: Бонус мастерства к КД против рукопашной атаки
      mechanics:
        type: defensive_duelist
        finesse_weapon: true
    description_full: '• Если вы используете оружие со свойством «фехтовальное», которым владеете, и другое существо попадает
      по вам рукопашной атакой, вы можете для этой атаки реакцией добавить бонус мастерства к КД, что потенциально может привести
      к промаху атаки.

      '
  dual_wielder:
    name: Использование двух оружий
    description: +1 КД с двумя рукопашными; сражение с двумя оружиями без «лёгкого»; вынимать/убирать два оружия.
    features:
    - name: Два оружия
      description: +1 КД; сражение с двумя оружиями; быстрое вынимание
      mechanics:
        type: dual_wielder
        ac_bonus: 1
    description_full: 'Вы знаете как использовать сразу два оружия, и получаете следующие преимущества:

      • Вы получаете бонус +1 к КД, когда держите в каждой руке по рукопашному оружию.

      • Вы можете использовать сражение с двумя оружиями даже если ни у одного из ваших одноручных оружий нет свойства «лёгкое».

      • Вы можете вынимать и убирать два одноручных оружия когда обычно позволяется вынуть или убрать только одно.

      '
  dungeon_delver:
    name: Исследователь подземелий
    description: Преимущество на поиск потайных дверей и ловушек; сопротивление урону ловушек; поиск на обычной скорости.
    features:
    - name: Мастерство ловушек
      description: Преимущество на спасброски от ловушек, контратака по ловушке
      mechanics:
        type: trap_mastery
        advantage_saves: traps
        counter_attack_damage: 1d6
    description_full: '• Научившись искать скрытые ловушки и потайные двери в подземельях, вы получаете следующие преимущества:

      • Вы совершаете с преимуществом проверки Мудрости (Внимательность) и Интеллекта (Анализ), совершённые для обнаружения
      потайных дверей.

      • Вы совершаете с преимуществом спасброски для избегания ловушек и сопротивления их эффектам.

      • Вы получаете сопротивление к урону от ловушек.

      • Вы можете искать ловушки, идя с обычной скоростью, а не медленной.

      '
  durable:
    name: Стойкий
    description: Телосложение +1; минимум восстановления по Кости Хитов — удвоенный модификатор Телосложения (мин. 2).
    ability_bonuses:
      constitution: 1
    features:
    - name: Живучесть
      description: Минимум восстановления по Кости Хитов
      mechanics:
        type: hit_dice_minimum
        multiplier: 2
        minimum: 2
    description_full: 'Вы стойкий и живучий, и получаете следующие преимущества:

      • Увеличьте значение Телосложения на 1, при максимуме 20.

      • Когда вы бросаете Кость Хитов для восстановления хитов, минимум равен удвоенному модификатору Телосложения (минимум
      2).

      '
  elemental_adept:
    name: Стихийный адепт
    description: Игнор сопротивления выбранному урону; «1» на костях урона считаются «2»; можно брать повторно.
    repeatable: true
    requirements:
    - type: spellcasting
    features:
    - name: Стихийный урон
      description: Игнор сопротивления; единицы на костях урона считаются как 2
      mechanics:
        type: elemental_adept
        damage_types:
        - thunder
        - acid
        - fire
        - cold
        - lightning
        choice: true
        ignore_resistance: true
        treat_ones_as_twos: true
    description_full: '• Когда вы получаете эту черту, выберите один из видов урона: звук, кислота, огонь, холод или электричество.

      • Накладываемые вами заклинания игнорируют сопротивление к выбранному виду урона. Кроме того, когда вы определяете урон
      от наложенного вами заклинания, причиняющего урон этого вида, вы можете считать все выпавшие на костях «1» как «2».

      • Вы можете брать эту черту несколько раз. Каждый раз, когда вы это делаете, вы выбираете новый вид урона.

      '
  grappler:
    name: Борец
    description: Преимущество на атаки по захваченным; действием — сковать захваченное существо.
    requirements:
    - type: ability_score
      target: strength
      value: 13
    features:
    - name: Захват
      description: Преимущество по захваченным; сковывание действием
      mechanics:
        type: grappler
        advantage_vs_grappled: true
        pin_action: true
    description_full: 'Вы развили навыки, нужные для тесного захвата противников. Вы получаете следующие преимущества:

      • Вы совершаете с преимуществом броски атаки по существу, которое держите в захвате.

      • Вы можете действием попытаться скрутить захваченное вами существо. Для этого совершите ещё одну проверку захвата.
      В случае успеха и вы и это существо становитесь опутанными до окончания захвата.

      '
  healer:
    name: Лекарь
    description: 'Комплект целителя: стабилизация с 1 хитом; лечение 1к6+4 + макс. Кости Хитов цели.'
    description_full: 'Вы способный медик, что позволяет быстро залечивать раны и возвращать союзников в строй. Вы получаете
      следующие преимущества:

      • Когда вы используете комплект целителя для стабилизации умирающего существа, это существо также восстанавливает 1
      хит.

      • Вы можете действием потратить одно использование комплекта целителя, чтобы позаботиться о существе и восстановить
      ему 1к6 + 4 хита, плюс дополнительные хиты, равные максимуму имеющихся у него Костей Хитов. Это существо не сможет повторно
      восстанавливать хиты от этой черты, пока не закончит короткий или продолжительный отдых.

      '
    features:
    - name: Эффективное лечение
      description: Стабилизация с 1 хитом; лечение 1к6+4 + макс. Кости Хитов цели
      mechanics:
        type: healing
        healer_kit_bonus: true
        stabilize_no_check: true
        heal_dice: 1d6
        heal_flat: 4
        heal_plus_target_max_hit_dice: true
        once_per_rest_per_target: true
  heavy_armor_master:
    name: Мастер тяжёлых доспехов
    description: Сила +1; в тяжёлом доспехе немагический физический урон снижается на 3.
    requirements:
    - type: armor_proficiency
      armors:
      - heavy
    features:
    - name: Снижение урона
      description: Снижает немагический урон от атак по тяжёлым доспехам
      mechanics:
        type: damage_reduction
        amount: 3
        damage_types:
        - nonmagical_physical
        condition: wearing_heavy_armor
    ability_bonuses:
      strength: 1
    description_full: 'Вы можете своим доспехом отклонять удары, которые других убили бы. Вы получаете следующие преимущества:

      • Увеличьте значение Силы на 1, при максимуме 20.

      • Если вы носите тяжёлый доспех, дробящий, колющий и рубящий урон, получаемый вами от немагического оружия, уменьшается
      на 3.

      '
  lucky:
    name: Везунчик
    description: '3 единицы удачи: дополнительный к20 на свои броски или при атаке по вам.'
    description_full: '• Вам непонятным образом везёт как раз тогда, когда это нужно.

      • У вас есть 3 единицы удачи. Каждый раз, когда вы совершаете бросок атаки, проверку характеристики или спасбросок,
      вы можете потратить одну единицу удачи, чтобы бросить дополнительный к20. Вы можете решить потратить единицу удачи после
      обычного броска кости, но до определения последствий. После этого вы сами выбираете, какую к20 использовать для броска
      атаки, проверки характеристики или спасброска.

      • Вы также можете потратить одну единицу удачи, когда по вам совершается бросок атаки. Бросьте к20, а потом решите,
      какую из костей будет использовать атакующий, вашу или свою.

      • Если сразу несколько существ тратят единицы удачи для оказания влияния на один бросок, единицы отменяют друг друга
      и дополнительные кости никто не кидает.

      • Вы восстанавливаете потраченные единицы удачи в конце продолжительного отдыха.

      '
    features:
    - name: Удача
      description: 3 единицы удачи; дополнительный к20 на свои броски или при атаке по вам
      mechanics:
        type: lucky
        luck_points: 3
        extra_d20_on_own_rolls: true
        extra_d20_when_attacked: true
        cancel_simultaneous_luck: true
        recharge: long_rest
  mobile:
    name: Подвижный
    description: Скорость +10 фт.; Рывок без замедления на труднопроходимой местности; рукопашная атака не провоцирует ответ.
    features:
    - name: Подвижность
      description: Скорость +10; Рывок; без провоцированных атак после рукопашной атаки
      mechanics:
        type: mobility
        speed_bonus: 10
        dash_ignores_difficult_terrain: true
        melee_attack_no_provoke: true
    description_full: 'Вы невероятно быстры и ловки. Вы получаете следующие преимущества:

      • Ваша скорость увеличивается на 10 футов.

      • Когда вы используете действие Рывок, труднопроходимая местность в этом ходу не замедляет ваше перемещение.

      • Если вы совершаете рукопашную атаку по существу, вы до конца этого хода не провоцируете от него атаки, вне зависимости
      от того, попадёте или нет.

      '
  resilient:
    name: Устойчивый
    description: Выбранная характеристика +1; владение спасбросками по этой характеристике.
    ability_bonuses_choice:
    - strength
    - dexterity
    - constitution
    - intelligence
    - wisdom
    - charisma
    ability_bonuses_amount: 1
    features:
    - name: Устойчивость
      description: Владение спасбросками выбранной характеристики
      mechanics:
        type: save_proficiency
        choice: true
    description_full: '• Выберите одну характеристику. Вы получаете следующие преимущества:

      • Увеличьте значение выбранной характеристики на 1, при максимуме 20.

      • Вы получаете владение спасбросками этой характеристики.

      '
  sentinel:
    name: Страж
    description: Провоцированная атака обнуляет скорость; Отход не спасает; реакция по атакующему союзника.
    features:
    - name: Защитная стойка
      description: Атаки возможностей останавливают цель, атака нападающих на союзников
      mechanics:
        type: protection
        opportunity_attack_stops_movement: true
        react_to_attacks_on_allies: true
        no_disadvantage_on_reach: true
    description_full: 'Вы овладели техникой, позволяющей пользоваться всеми брешами в обороне противника, и получаете следующие
      преимущества:

      • Если вы попадаете по существу провоцированной атакой, скорость этого существа падает до 0 до конца текущего хода.

      • Существа перед выходом из вашей досягаемости провоцируют от вас атаки, даже если совершают действие Отход.

      • Если существо, находящееся в пределах 5 футов от вас, совершает атаку не по вам (и у цели нет этой черты), вы можете
      реакцией совершить атаку рукопашным оружием по атакующему.

      '
  skilled:
    name: Одарённый
    description: Владение любой комбинацией из трёх навыков и инструментов.
    features:
    - name: Разностороннее владение
      description: Владение тремя навыками или инструментами
      mechanics:
        type: multiple_proficiency
        skills_tools: []
        choice: true
        count: 3
        types:
        - skill
        - tool
    description_full: '• Вы получаете владение любой комбинацией из трёх навыков и инструментов на ваш выбор.

      '
  tough:
    name: Крепкий
    description: Максимум хитов +2× уровень при взятии; +2 за каждый последующий уровень.
    features:
    - name: Дополнительные хиты
      description: 2 дополнительных хита за уровень персонажа
      mechanics:
        type: hit_point_bonus
        amount: 2
        per_level: true
    description_full: '• Максимум ваших хитов увеличивается на количество, равное удвоенному уровню, на котором берётся эта
      черта. Каждый раз, когда вы впоследствии будете получать уровень, максимум ваших хитов будет дополнительно увеличиваться
      на 2.

      '
  war_caster:
    name: Боевой заклинатель
    description: Преимущество на концентрацию; соматические компоненты с оружием/щитом; заклинание вместо провоцированной
      атаки.
    requirements:
    - type: spellcasting
    features:
    - name: Боевое колдовство
      description: Концентрация; соматика с оружием/щитом; заклинание вместо провоцированной атаки
      mechanics:
        type: combat_spellcasting
        advantage_concentration_saves: true
        somatic_with_weapon_shield: true
        spell_instead_of_opportunity_attack: true
    description_full: '• Вы научились накладывать заклинания в пылу сражения и узнали техники, дающие следующие преимущества:

      • Вы совершаете с преимуществом спасброски Телосложения для поддержания концентрации на заклинании при получении урона.

      • Вы можете выполнять телесный компонент заклинаний даже если используете оружие или щит в одной или обеих руках.

      • Если перемещение враждебного существа провоцирует от вас атаку, вы можете вместо совершения провоцированной атаки
      реакцией наложить на это существо заклинание. Время наложения этого заклинания должно быть «1 действие» и оно должно
      нацеливаться только на это существо.

      '
  alert:
    name: Бдительный
    description: Бонус +5 к инициативе; вас не застать врасплох; скрытые не получают преимущества.
    features:
    - name: Бдительность
      mechanics:
        type: initiative_bonus
        bonus: 5
    description_full: '• Вы получаете бонус +5 к проверкам инициативы.

      • Вас не могут застать врасплох, пока вы в сознании.

      • Другие существа не получают преимущество для бросков атаки по вам за то, что они скрыты от вас.

      '
  martial_adept:
    name: Воинский адепт
    description: Два приёма воина и одна кость превосходства (к6).
    features:
    - name: Боевые приёмы
      mechanics:
        type: martial_adept
        maneuvers: 2
        superiority_die: d6
    description_full: 'Вы прошли военную подготовку, позволяющую совершать особые боевые приёмы. Вы получаете следующие преимущества:

      • Вы узнаёте два приёма на свой выбор из списка архетипа воина Мастер боевых искусств. Если приём требует, чтобы цель
      совершила спасбросок для сопротивления эффекту приёма, Сл спасброска равна 8 + ваш бонус мастерства + модификатор Силы
      или Ловкости (на ваш выбор).

      • Если у вас уже есть кости превосходства, вы получаете ещё одну; в противном случае вы получаете одну кость превосходства:
      к6. Эта кость подпитывает ваши приёмы. Кость превосходства тратится, когда вы её используете, и восстанавливается после
      окончания короткого или продолжительного отдыха.

      '
  mounted_combatant:
    name: Верховой боец
    description: 'Верхом: преимущество по меньшим существам; перенацеливание атак; спасброски скакуна.'
    features:
    - name: Верховая тактика
      mechanics:
        type: mounted_combat
    description_full: 'Вы — опасный враг, когда вы верхом на скакуне. Если вы находитесь верхом и не выведены из строя, вы
      получаете следующие преимущества:

      • Вы совершаете с преимуществом броски рукопашных атак по существам, чей размер меньше вашего скакуна, и не находящимся
      при этом верхом.

      • Вы можете сделать так, что атака, нацеленная на вашего скакуна, будет перенацелена на вас.

      • Если ваш скакун попадает под эффект, позволяющий совершить спасбросок Ловкости для получения половины урона, то он
      не получает урон в случае успеха и получает всего половину урона при провале.

      '
  observant:
    name: Внимательный
    description: Интеллект или Мудрость +1; чтение по губам; +5 к пассивным Внимательности и Анализу.
    ability_bonuses_choice:
    - intelligence
    - wisdom
    ability_bonuses_amount: 1
    features:
    - name: Внимательность
      mechanics:
        type: passive_bonus
        skills:
        - perception
        - investigation
        bonus: 5
    description_full: 'Вы быстро улавливаете мелкие подробности и получаете следующие преимущества:

      • Увеличьте значение Интеллекта или Мудрости на 1, при максимуме 20.

      • Если вы видите рот существа, когда оно говорит на языке, который вы понимаете, вы можете прочитать по его губам, что
      оно говорит.

      • Вы получаете бонус +5 к пассивной проверке Мудрости (Внимательность) и пассивной проверке Интеллекта (Анализ).

      '
  inspiring_leader:
    name: Воодушевляющий лидер
    description: 10 минут — временные хиты (уровень + модификатор Харизмы) до 6 существ в 30 фт.
    requirements:
    - type: ability_score
      target: charisma
      value: 13
    features:
    - name: Воодушевление
      mechanics:
        type: temp_hp_grant
    description_full: '• Вы можете потратить 10 минут на воодушевление спутников, укрепляя их решимость. Если вы делаете это,
      выберите до шести дружественных существ (можете включить себя) в пределах 30 футов от себя, которые могут видеть или
      слышать вас, и которые могут вас понять. Все эти существа получают временные хиты в количестве, равном вашему уровню
      + ваш модификатор Харизмы. Существа больше не могут получать временные хиты от этой черты, пока не окончат короткий
      или продолжительный отдых.

      '
  savage_attacker:
    name: Дикий атакующий
    description: Раз в ход переброс всех костей урона рукопашной атаки.
    features:
    - name: Переброс урона
      mechanics:
        type: damage_reroll
        trigger: melee_weapon
    description_full: '• Один раз в ход, когда вы совершаете бросок урона для атаки рукопашным оружием, вы можете перебросить
      все кости урона оружия и использовать любой из вариантов.

      '
  tavern_brawler:
    name: Драчун
    description: Сила или Телосложение +1; импровизированное оружие; безоружный удар к4; захват бонусным действием.
    ability_bonuses_choice:
    - strength
    - constitution
    ability_bonuses_amount: 1
    features:
    - name: Мордобой
      mechanics:
        type: unarmed_improvised
        unarmed_die: 4
        weapon_proficiency:
        - improvised
    description_full: 'Привыкнув к мордобою с использованием подручных предметов, вы получаете следующие преимущества:

      • Увеличьте значение Силы или Телосложения на 1, при максимуме 20.

      • Вы получаете владение импровизированным оружием.

      • Ваш безоружный удар использует для урона к4.

      • Если вы в свой ход попадаете по существу безоружным ударом или импровизированным оружием, вы можете бонусным действием
      попытаться захватить цель.

      '
  great_weapon_master:
    name: Мастер большого оружия
    description: Бонусная атака при крите/убийстве; −5/+10 на тяжёлое оружие.
    features:
    - name: Тяжёлое оружие
      mechanics:
        type: great_weapon_master
    description_full: 'Вы научились использовать вес своего оружия, позволяя инерции усиливать ваши атаки. Вы получаете следующие
      преимущества:

      • В свой ход, когда вы совершаете критическое попадание рукопашным оружием или опускаете им хиты существа до 0, вы можете
      бонусным действием совершить одну атаку рукопашным оружием.

      • Перед совершением атаки рукопашным оружием со свойством «тяжёлое», которым вы владеете, вы можете принять штраф −5
      к броску атаки. Если такая атака попадает, вы добавляете +10 к урону от этой атаки.

      '
  polearm_master:
    name: Мастер древкового оружия
    description: Бонусная атака противоположным концом; провоцированные атаки при входе в досягаемость.
    features:
    - name: Древковое оружие
      mechanics:
        type: polearm_master
    description_full: 'Вы можете сдерживать врагов оружием со свойством «досягаемость». Вы получаете следующие преимущества:

      • Если вы совершаете действие Атака и атакуете только алебардой, боевым посохом или глефой, вы можете бонусным действием
      совершить рукопашную атаку противоположным концом оружия. Кость урона для этой атаки равна к4, и атака причиняет дробящий
      урон. Бонусная атака использует модификатор той же характеристики, что и основная.

      • Если вы используете алебарду, боевой посох, глефу или пику, другие существа провоцируют от вас атаку, когда входят
      в пределы вашей досягаемости.

      '
  medium_armor_master:
    name: Мастер средних доспехов
    description: Средние доспехи без помехи Скрытности; +3 к КД при Ловкости 16+.
    requirements:
    - type: armor_proficiency
      armors:
      - medium
    features:
    - name: Средние доспехи
      mechanics:
        type: medium_armor_master
    description_full: 'Вы привыкли к перемещению в средних доспехах и получаете следующие преимущества:

      • Ношение среднего доспеха не накладывает помеху к проверкам Ловкости (Скрытность).

      • Когда вы носите средний доспех, вы можете добавлять к КД 3, а не 2, если ваша Ловкость 16 или выше.

      '
  shield_master:
    name: Мастер щитов
    description: Толчок щитом; бонус щита к спасброскам; реакция без урона при успешном спасброске.
    features:
    - name: Щит
      mechanics:
        type: shield_master
    description_full: 'Вы используете щиты не только для обороны, но и для нападения. Вы получаете следующие преимущества,
      когда используете щит:

      • Если вы в свой ход совершаете действие Атака, вы можете бонусным действием попытаться оттолкнуть щитом существо, находящееся
      в пределах 5 футов от вас.

      • Если вы не выведены из строя, вы можете добавлять бонус к КД от щита ко всем спасброскам Ловкости, совершённым от
      заклинаний и прочих вредоносных эффектов, нацеленных только на вас.

      • Если вы подвергаетесь действию эффекта, позволяющего совершить спасбросок Ловкости для получения половины урона, вы
      можете реакцией вообще не получить урон в случае успешного спасброска, выставив щит между собой и источником эффекта.

      '
  keen_mind:
    name: Отличная память
    description: Интеллект +1; ориентирование по сторонам света, времени; идеальная память за месяц.
    ability_bonuses:
      intelligence: 1
    features:
    - name: Память
      mechanics:
        type: keen_mind
    description_full: 'Вы с невероятной точностью можете отслеживать время, направление и подробности. Вы получаете следующие
      преимущества:

      • Увеличьте значение Интеллекта на 1, при максимуме 20.

      • Вы всегда знаете, в какой стороне находится север.

      • Вы всегда знаете, через сколько часов наступит следующий закат или восход.

      • Вы можете с точностью вспомнить всё, что видели или слышали за последний месяц.

      '
  spell_sniper:
    name: Меткие заклинания
    description: Удвоенная дистанция атакующих заклинаний; игнор укрытия; заговор атаки.
    requirements:
    - type: spellcasting
    features:
    - name: Снайпер заклинаний
      mechanics:
        type: spell_sniper
        cantrip_choice: true
    description_full: 'Вы узнали технику, улучшающую атаку некоторыми видами заклинаний, и получаете следующие преимущества:

      • Если вы накладываете заклинание, требующее совершение броска атаки, дистанция заклинания удваивается.

      • Ваши дальнобойные атаки заклинаниями игнорируют укрытие на половину и укрытие на три четверти.

      • Вы узнаёте один заговор, требующий броска атаки. Выберите заговор из списка заклинаний барда, волшебника, друида,
      жреца, колдуна или чародея.

      '
  sharpshooter:
    name: Меткий стрелок
    description: Стрельба на макс. дистанции без помехи; игнор укрытия; −5/+10.
    features:
    - name: Стрельба
      mechanics:
        type: sharpshooter
    description_full: 'Вы овладели дальнобойным оружием и можете совершать выстрелы, которые другие считали невозможными.
      Вы получаете следующие преимущества:

      • Совершение атаки в пределах максимальной дистанции не вызывает помеху к броску атаки дальнобойным оружием.

      • Ваши атаки дальнобойным оружием игнорируют укрытие на половину и укрытие на три четверти.

      • Перед совершением атаки дальнобойным оружием, которым вы владеете, вы можете принять штраф −5 к броску атаки. Если
      такая атака попадает, вы добавляете +10 к урону от этой атаки.

      '
  magic_initiate:
    name: Посвящённый в магию
    description: Два заговора и одно заклинание 1 уровня от выбранного класса; 1/продолжительный отдых.
    features:
    - name: Магия
      mechanics:
        type: magic_initiate
        choice: true
        classes:
        - bard
        - cleric
        - druid
        - sorcerer
        - warlock
        - wizard
    description_full: '• Выберите класс: бард, волшебник, друид, жрец, колдун или чародей. Вы узнаёте два заговора на свой
      выбор из списка заклинаний этого класса.

      • Кроме того, выберите одно заклинание 1 уровня из этого же списка. Вы узнаёте это заклинание и можете накладывать его
      на минимально возможном уровне. После использования заклинания вы должны закончить продолжительный отдых, прежде чем
      сможете снова использовать его этой чертой.

      '
  ritual_caster:
    name: Ритуальный заклинатель
    description: Ритуальная книга с двумя ритуалами 1 уровня; копирование ритуалов по правилам черты.
    requirements:
    - type: ability_score
      target: intelligence
      value: 13
      alternative: true
    - type: ability_score
      target: wisdom
      value: 13
      alternative: true
    features:
    - name: Ритуалы
      mechanics:
        type: ritual_caster
        choice: true
        classes:
        - bard
        - cleric
        - druid
        - sorcerer
        - warlock
        - wizard
    description_full: '• Вы узнали несколько заклинаний, которые можете накладывать как ритуалы. Эти заклинания записаны в
      ритуальной книге, которую вы должны держать в руке во время их использования.

      • Когда вы выбираете эту черту, вы получаете ритуальную книгу, содержащую два заклинания 1 уровня на ваш выбор. Выберите
      один из классов: бард, волшебник, друид, жрец, колдун или чародей. Заклинания должны иметь ключевое слово «ритуал».

      '
  mage_slayer:
    name: Убийца магов
    description: Реакция по заклинателю в 5 фт.; помеха концентрации; преимущество на спасброски от заклинаний рядом.
    features:
    - name: Антимагия
      mechanics:
        type: mage_slayer
    description_full: 'Вы разработали техники, полезные в рукопашном сражении с заклинателями, и получаете следующие преимущества:

      • Если существо в пределах 5 футов от вас использует заклинание, вы можете реакцией совершить атаку рукопашным оружием
      по этому существу.

      • Когда вы причиняете урон существу, концентрирующемуся на заклинании, это существо совершает с помехой спасбросок для
      поддержания концентрации.

      • Вы совершаете с преимуществом спасброски от заклинаний, наложенных существами, находящимися в пределах 5 футов от
      вас.

      '
  linguist:
    name: Языковед
    description: Интеллект +1; три языка; шифрованные письма.
    ability_bonuses:
      intelligence: 1
    features:
    - name: Языки
      mechanics:
        type: language
        count: 3
        choice: true
    description_full: 'Вы изучали языки и способы кодирования текстов, и получаете следующие преимущества:

      • Увеличьте значение Интеллекта на 1, при максимуме 20.

      • Вы узнаёте три языка на свой выбор.

      • Вы можете писать шифрованные письма. Другие не могут расшифровать код, пока либо вы не научите их, либо они не преуспеют
      в проверке Интеллекта, либо они не используют для расшифровки магию.

      '
  skulker:
    name: Проныра
    description: Скрытность при слабом укрытии; выстрел не выдаёт позицию; тусклый свет не мешает Внимательности.
    requirements:
    - type: ability_score
      target: dexterity
      value: 13
    features:
    - name: Скрытность
      mechanics:
        type: skulker
    description_full: 'Вы знаете, как сливаться с тенями. Вы получаете следующие преимущества:

      • Вы можете попытаться спрятаться даже если слабо заслонены от существа, от которого прячетесь.

      • Если вы прячетесь от существа и промахиваетесь по нему атакой дальнобойным оружием, эта атака не выдаёт вашу позицию.

      • Тусклый свет не причиняет помеху вашим проверкам Мудрости (Внимательность), полагающимся на зрение.

      '
