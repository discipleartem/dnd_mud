# Языки Dungeons & Dragons 5e
# Ключ id языка, внутри — метаданные и локализация

languages:
  common:
    type: "standard"
    difficulty: "easy"
    script: "common"
    is_default: true
    fallback_name: "Общий"
    fallback_description: "Основной язык торговли и общения между расами"

  elvish:
    type: "standard"
    difficulty: "normal"
    script: "elvish"
    is_default: false
    learnable_by: ["elf", "high_elf", "half_elf"]
    race_bonus: ["elf", "high_elf"]
    fallback_name: "Эльфийский"
    fallback_description: "Изящный язык эльфов с древней историей"

  dwarvish:
    type: "standard"
    difficulty: "normal"
    script: "dwarvish"
    is_default: false
    learnable_by: ["dwarf"]
    race_bonus: ["dwarf", "mountain_dwarf", "hill_dwarf"]
    fallback_name: "Дварфийский"
    fallback_description: "Грубый и резкий язык дварфов"

  orcish:
    type: "standard"
    difficulty: "normal"
    script: "dwarvish"
    is_default: false
    learnable_by: ["orc", "half_orc"]
    race_bonus: ["orc", "half_orc"]
    fallback_name: "Орочий"
    fallback_description: "Жёсткий и агрессивный язык орков"

  halfling:
    type: "standard"
    difficulty: "easy"
    script: "common"
    is_default: false
    learnable_by: ["halfling"]
    race_bonus: ["lightfoot_halfling", "stout_halfling"]
    fallback_name: "Полурослийский"
    fallback_description: "Простой и мелодичный язык полуросликов"

  draconic:
    type: "exotic"
    difficulty: "hard"
    script: "draconic"
    is_default: false
    learnable_by: ["dragonborn"]
    race_bonus: ["dragonborn"]
    magic_language: true
    fallback_name: "Драконий"
    fallback_description: "Древний язык драконов и драконорожденных"

  gnomish:
    type: "standard"
    difficulty: "normal"
    script: "dwarvish"
    is_default: false
    learnable_by: ["gnome"]
    race_bonus: ["rock_gnome", "forest_gnome"]
    fallback_name: "Гномийский"
    fallback_description: "Сложный и технический язык гномов"

  abyssal:
    type: "planar"
    difficulty: "very_hard"
    script: "infernal"
    is_default: false
    learnable_by_special: ["warlock", "cleric"]
    magic_language: true
    evil_alignment: true
    fallback_name: "Бездонный"
    fallback_description: "Язык демонов и тёмных существ"

  celestial:
    type: "planar"
    difficulty: "very_hard"
    script: "celestial"
    is_default: false
    learnable_by_special: ["cleric", "paladin"]
    magic_language: true
    good_alignment: true
    fallback_name: "Небесный"
    fallback_description: "Язык ангелов и небожителей"

  infernal:
    type: "planar"
    difficulty: "very_hard"
    script: "infernal"
    is_default: false
    learnable_by_special: ["warlock", "sorcerer"]
    magic_language: true
    lawful_evil_alignment: true
    fallback_name: "Инфернальный"
    fallback_description: "Язык дьяволов и законных злых существ"

  primordial:
    type: "elemental"
    difficulty: "hard"
    script: "dwarvish"
    is_default: false
    learnable_by_special: ["druid", "ranger"]
    magic_language: true
    fallback_name: "Первородный"
    fallback_description: "Древний язык элементалей"

  sylvan:
    type: "exotic"
    difficulty: "normal"
    script: "elvish"
    is_default: false
    learnable_by: ["elf", "fairy"]
    race_bonus: ["elf", "fairy"]
    magic_language: true
    fallback_name: "Лесной"
    fallback_description: "Язык лесных существ и фей"

  undercommon:
    type: "secret"
    difficulty: "hard"
    script: "elvish"
    is_default: false
    learnable_by: ["drow", "duergar"]
    race_bonus: ["drow", "duergar"]
    secret_language: true
    fallback_name: "Подземный"
    fallback_description: "Торговый язык Подземья"