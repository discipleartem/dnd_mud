# Сценарий обучения (Tutorial)

scenario:
  id: tutorial
  start_node: welcome

  nodes:
    welcome:
      description:
        ru: "Добро пожаловать в обучение! Пройдите тренировку, чтобы набрать опыт."
        en: "Welcome to the tutorial! Complete training to gain experience."
      choices:
        - text:
            ru: "Начать тренировку"
            en: "Start training"
          next: training

    training:
      description:
        ru: "Вы завершаете базовую тренировку и получаете опыт."
        en: "You complete basic training and gain experience."
      action: grant_xp
      amount: 900
      next: subclass_trainer

    subclass_trainer:
      description:
        ru: "Наставник помогает освоить архетип и умения, доступные на 3 уровне."
        en: "A mentor helps you learn your subclass and level 3 features."
      action: subclass_training
      message_key: scenario.subclass_not_ready
      next: finish

    finish:
      description:
        ru: "Обучение завершено."
        en: "Tutorial complete."
      choices:
        - text:
            ru: "Вернуться"
            en: "Go back"
          action: exit
          next: null
